apiVersion: apps/v1
kind: Deployment
metadata:
  name: formatter-service
  namespace: interview-ai
  labels:
    app: formatter-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: formatter-service
  template:
    metadata:
      labels:
        app: formatter-service
    spec:
      containers:
        - name: formatter-service
          image: azizowaisi/interview-ai-formatter-service:sha-0000000
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
