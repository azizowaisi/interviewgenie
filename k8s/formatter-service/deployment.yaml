apiVersion: apps/v1
kind: Deployment
metadata:
  name: formatter-service
  namespace: interview-ai
  labels:
    app: formatter-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: formatter-service
  template:
    metadata:
      labels:
        app: formatter-service
    spec:
      containers:
        - name: formatter-service
          image: interview-ai/formatter-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
