apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: interview-ai
  labels:
    app: web
spec:
  replicas: 1
  # Old pod is terminated first on constrained single-node clusters (maxSurge 0, maxUnavailable 1)
  # to avoid extra Pending pods during image rollouts.
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: web
          image: azizowaisi/interview-ai-web:sha-0000000
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          env:
            - name: API_URL
              value: "http://api-service:8001"
            - name: AUDIO_URL
              value: "http://audio-service:8000"
            - name: MONITORING_URL
              value: "http://monitoring-service:3001"
            # Must equal monitoring-service ADMIN_TOKEN when Secret monitoring-admin is set (same secret on both Deployments).
            # If this env is empty, users can still use the admin site token field (browser → /api/mon → monitoring).
            - name: MONITORING_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: monitoring-admin
                  key: ADMIN_TOKEN
                  optional: true
          envFrom:
            # Runtime Auth0 + BFF. Include AUTH0_AUDIENCE (Auth0 API identifier) — do not set the same
            # var in `env` above; explicit env wins over envFrom and would ignore secret updates (401 on Save).
            # Keys: AUTH0_DOMAIN, AUTH0_ISSUER_BASE_URL, AUTH0_CLIENT_ID, AUTH0_CLIENT_SECRET,
            # AUTH0_SECRET, AUTH0_BASE_URL, APP_BASE_URL, AUTH0_AUDIENCE (required for Save job / BFF),
            # NEXT_PUBLIC_PUBLIC_APP_URL (optional if baked in image). Stuck for days? docs/AUTH0-END-TO-END-FIX.md
            - secretRef:
                name: web-auth0-env
                optional: true
            # NEXT_PUBLIC_* for host routing + outbound links are baked at docker build — pass build-args in CI for production URLs.
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # HTTP readiness (not TCP): require 2xx for both main and admin Host headers (middleware differs by host).
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - |
                  const http = require("http");
                  const hosts = ["interviewgenie.teckiz.com", "admin.interviewgenie.teckiz.com"];
                  let i = 0;
                  function fail() {
                    process.exit(1);
                  }
                  function step() {
                    if (i >= hosts.length) process.exit(0);
                    const req = http.get(
                      { hostname: "127.0.0.1", port: 3002, path: "/", headers: { Host: hosts[i] } },
                      (res) => {
                        const ok = res.statusCode >= 200 && res.statusCode < 500;
                        res.resume();
                        res.on("end", () => {
                          if (!ok) fail();
                          else {
                            i++;
                            step();
                          }
                        });
                      }
                    );
                    req.on("error", fail);
                  }
                  step();
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3002
              httpHeaders:
                - name: Host
                  value: interviewgenie.teckiz.com
            initialDelaySeconds: 15
            periodSeconds: 20
