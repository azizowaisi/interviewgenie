apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: interview-ai
  labels:
    app: web
spec:
  replicas: 1
  # New pod must become Ready before old is terminated (maxSurge 1, maxUnavailable 0).
  # Traefik only sends traffic to Ready endpoints, so shift happens first; old pod exits after scale-down + grace period.
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: web
          image: interview-ai/web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
          env:
            - name: API_URL
              value: "http://api-service:8001"
            - name: AUDIO_URL
              value: "http://audio-service:8000"
            - name: MONITORING_URL
              value: "http://monitoring-service:3001"
            # Must equal monitoring-service ADMIN_TOKEN when Secret monitoring-admin is set (same secret on both Deployments).
            # If this env is empty, users can still use the admin site token field (browser → /api/mon → monitoring).
            - name: MONITORING_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: monitoring-admin
                  key: ADMIN_TOKEN
                  optional: true
            # NEXT_PUBLIC_* for host routing + outbound links are baked at docker build — pass build-args in CI for production URLs.
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # HTTP readiness (not TCP): require 2xx for both main and admin Host headers (middleware differs by host).
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - |
                  const http = require("http");
                  const hosts = ["interviewgenie.teckiz.com", "admin.interviewgenie.teckiz.com"];
                  let i = 0;
                  function fail() {
                    process.exit(1);
                  }
                  function step() {
                    if (i >= hosts.length) process.exit(0);
                    const req = http.get(
                      { hostname: "127.0.0.1", port: 3002, path: "/", headers: { Host: hosts[i] } },
                      (res) => {
                        const ok = res.statusCode >= 200 && res.statusCode < 500;
                        res.resume();
                        res.on("end", () => {
                          if (!ok) fail();
                          else {
                            i++;
                            step();
                          }
                        });
                      }
                    );
                    req.on("error", fail);
                  }
                  step();
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3002
              httpHeaders:
                - name: Host
                  value: interviewgenie.teckiz.com
            initialDelaySeconds: 15
            periodSeconds: 20
