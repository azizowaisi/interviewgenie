# Namespace-scoped: pods, logs, services, deployments (restart), pod metrics
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: monitoring-interview-ai
  namespace: interview-ai
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: monitoring-interview-ai
  namespace: interview-ai
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: monitoring-interview-ai
subjects:
  - kind: ServiceAccount
    name: monitoring-service
    namespace: interview-ai
---
# Cluster-scoped: node status + node metrics (lightweight overview)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: interview-ai-monitoring-nodes
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: interview-ai-monitoring-nodes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: interview-ai-monitoring-nodes
subjects:
  - kind: ServiceAccount
    name: monitoring-service
    namespace: interview-ai
