apiVersion: apps/v1
kind: Deployment
metadata:
  name: audio-service
  namespace: interview-ai
  labels:
    app: audio-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: audio-service
  template:
    metadata:
      labels:
        app: audio-service
    spec:
      containers:
        - name: audio-service
          image: azizowaisi/interview-ai-audio-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: STT_SERVICE_URL
              value: "http://stt-service:8000"
            - name: QUESTION_SERVICE_URL
              value: "http://question-service:8000"
            - name: LLM_SERVICE_URL
              value: "http://llm-service:8000"
            - name: FORMATTER_SERVICE_URL
              value: "http://formatter-service:8000"
            - name: API_SERVICE_URL
              value: "http://api-service:8001"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
