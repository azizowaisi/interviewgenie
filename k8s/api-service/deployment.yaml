apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: interview-ai
  labels:
    app: api-service
spec:
  replicas: 1
  # RWO PVC (cv-uploads): only one pod can mount local-path volumes — no maxSurge second pod.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
        - name: api-service
          image: azizowaisi/interview-ai-api-service:sha-0000000
          # IfNotPresent avoids Docker Hub rate limits; production pins immutable sha-* tags via CI.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          volumeMounts:
            - name: cv-storage
              mountPath: /cv_storage
          env:
            - name: MONGODB_URI
              value: "mongodb://mongo:27017"
            - name: MONGODB_DB
              value: "interview_ai"
            - name: UPLOAD_DIR
              value: "/cv_storage"
            # Traefik strips /api/svc before traffic reaches this pod; OpenAPI + root JSON use public paths.
            - name: PUBLIC_API_PATH_PREFIX
              value: "/api/svc"
            # Enable per-user persistence via Auth0 JWTs (fallback: X-User-Id when missing).
            - name: AUTH0_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: web-auth0-env
                  key: AUTH0_DOMAIN
                  optional: true
            # Must match web BFF and Auth0 API identifier — read from same secret as web.
            # If empty in pod, Save Job → 503. Runbook: docs/AUTH0-END-TO-END-FIX.md
            - name: AUTH0_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: web-auth0-env
                  key: AUTH0_AUDIENCE
                  optional: true
            # Same Client ID as the web Auth0 application (required for ID-token fallback when
            # the session has no API access token yet; Save job / BFF).
            - name: AUTH0_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: web-auth0-env
                  key: AUTH0_CLIENT_ID
                  optional: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 8"]
      volumes:
        - name: cv-storage
          persistentVolumeClaim:
            claimName: cv-uploads
