# HorizontalPodAutoscaler for stateless workers (no RWO PVC on the Deployment).
# Requires metrics-server (bundled with k3s). Tune maxReplicas to your node CPU/RAM.
#
# Rough capacity check (example): sum(requests.cpu) * maxReplicas < allocatable CPU on the node.
#
# api-service uses RWO PVC (cv-uploads): extra replicas stay Pending on a single node — maxReplicas=1 below.
# To scale api horizontally use ReadWriteMany / object storage for uploads, then raise maxReplicas (see K8S-SCALING-AND-ROLLING.md).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-service
  namespace: interview-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-service
  minReplicas: 1
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 1
          periodSeconds: 30
      selectPolicy: Max
---
