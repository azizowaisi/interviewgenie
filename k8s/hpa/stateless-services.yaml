# HorizontalPodAutoscaler for stateless workers (no RWO PVC on the Deployment).
# Requires metrics-server (bundled with k3s). Tune maxReplicas to your node CPU/RAM.
#
# Rough capacity check (example): sum(requests.cpu) * maxReplicas < allocatable CPU on the node.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: audio-service
  namespace: interview-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: audio-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
        - type: Percent
          value: 100
          periodSeconds: 30
      selectPolicy: Max
---
