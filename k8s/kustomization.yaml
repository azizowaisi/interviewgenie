apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: interview-ai
resources:
  - namespace.yaml
  - ingress/traefik-middleware.yaml
  - ingress/ingressroute.yaml
  - ingress/admin-ingressroute.yaml
  # Traefik HelmChartConfig lives in kube-system — apply separately:
  #   kubectl apply -f k8s/traefik/helmchartconfig.yaml
  # MongoDB (persistent); StorageClass before StatefulSet
  - mongo/storageclass.yaml
  - mongo/statefulset.yaml
  - mongo/service.yaml
  # API: CV upload, history, sessions (mounts cv-uploads PVC)
  - api-service/pvc.yaml
  - api-service/deployment.yaml
  - api-service/service.yaml
  - audio-service/deployment.yaml
  - audio-service/service.yaml
  - stt-service/deployment.yaml
  - stt-service/service.yaml
  - question-service/deployment.yaml
  - question-service/service.yaml
  - llm-service/deployment.yaml
  - llm-service/service.yaml
  - formatter-service/deployment.yaml
  - formatter-service/service.yaml
  - hpa/stateless-services.yaml
  - ollama/pvc.yaml
  - ollama/deployment.yaml
  - ollama/service.yaml
  - monitoring-service/serviceaccount.yaml
  - monitoring-service/rbac.yaml
  - monitoring-service/deployment.yaml
  - monitoring-service/service.yaml
  # Next.js app (admin host + optional main host when ingress is updated)
  - web-service/deployment.yaml
  - web-service/service.yaml
