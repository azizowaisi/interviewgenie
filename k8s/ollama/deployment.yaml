apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: interview-ai
  labels:
    app: ollama
    model: mistral-7b-v0
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: ollama
      model: mistral-7b-v0
  template:
    metadata:
      labels:
        app: ollama
        model: mistral-7b-v0
    spec:
      # Force scheduling onto ARM64 nodes for CPU-only inference.
      nodeSelector:
        kubernetes.io/arch: arm64
      initContainers:
        - name: ensure-ollama-dirs
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /root/.ollama/models
              chmod 755 /root/.ollama /root/.ollama/models
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
      containers:
        - name: ollama
          image: ollama/ollama:mistral-7b-v0
          imagePullPolicy: Always
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "8Gi"
              cpu: "1500m"
            limits:
              memory: "12Gi"
              cpu: "4000m"
          readinessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
