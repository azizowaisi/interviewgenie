apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: interview-ai
  labels:
    app: ollama
    model: mistral-7b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      # Remove nodeSelector if you're on amd64
      # nodeSelector:
      #   kubernetes.io/arch: arm64
      initContainers:
        - name: ensure-ollama-dirs
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /root/.ollama/models
              chmod 755 /root/.ollama /root/.ollama/models
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: OLLAMA_MODELS
              value: /root/.ollama/models
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "8Gi"
              cpu: "2000m"
            limits:
              memory: "16Gi"
              cpu: "4000m"
          readinessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
