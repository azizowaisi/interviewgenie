# Production target: Oracle VM.Standard.A1.Flex (ARM), 8 OCPU, 48 GiB RAM, block storage — leaves headroom for Mongo, api-service, Traefik.
# Local dev on a laptop: lower requests/limits and set OLLAMA_NUM_PARALLEL=1 (see docs/K8S-LLM-FULL-ARCHITECTURE.md).
# Pending pod? kubectl describe node / pod → adjust requests or shrink the model.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: interview-ai
  labels:
    app: ollama
    model: mistral
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      # Remove nodeSelector if you're on amd64
      # nodeSelector:
      #   kubernetes.io/arch: arm64
      initContainers:
        - name: ensure-ollama-dirs
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /root/.ollama/models
              chmod 755 /root/.ollama /root/.ollama/models
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
        - name: pull-mistral-model
          image: ollama/ollama:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              set -eu
              ollama serve >/tmp/ollama-init.log 2>&1 &
              pid="$!"
              cleanup() {
                kill "$pid" >/dev/null 2>&1 || true
              }
              trap cleanup EXIT
              i=0
              until ollama list >/dev/null 2>&1; do
                i=$((i + 1))
                if [ "$i" -gt 60 ]; then
                  echo "Ollama daemon did not become ready in time"
                  exit 1
                fi
                sleep 2
              done
              ollama pull mistral
              ollama list | grep -q "mistral"
          env:
            - name: OLLAMA_HOST
              value: "127.0.0.1:11434"
            - name: OLLAMA_MODELS
              value: /root/.ollama/models
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "1"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: OLLAMA_MODELS
              value: /root/.ollama/models
            # Keep a single active generate on CPU nodes for stability.
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "1"
            # Avoid mid-request termination of long CPU generations.
            - name: OLLAMA_LOAD_TIMEOUT
              value: "20m"
            - name: OLLAMA_KEEP_ALIVE
              value: "30m"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "12Gi"
              cpu: "3500m"
            limits:
              memory: "28Gi"
              cpu: "7500m"
          readinessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 6
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - ollama list | grep -q "mistral"
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 90
          livenessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
