apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: interview-ai
  labels:
    app: ollama
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      # Ensure models dir exists on the PVC (avoids "mkdir .../models: no such file or directory" on some storage).
      initContainers:
        - name: ensure-ollama-dirs
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /root/.ollama/models
              chmod 755 /root/.ollama /root/.ollama/models
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
          resources:
            requests:
              memory: "4Gi"
              cpu: "500m"
            limits:
              memory: "12Gi"
              cpu: "4000m"
          readinessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
