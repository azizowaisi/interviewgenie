# Traefik IngressRoute: expose API and WebSocket (k3s includes Traefik)
# Single route: avoids duplicate ACME orders from two IngressRoutes with the same tls.domains.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: interview-ai-http
  namespace: interview-ai
spec:
  entryPoints:
    - web
    - websecure
  tls:
    certResolver: le
    domains:
      - main: interviewgenie.teckiz.com
  routes:
    # PathPrefix(`/ws`) includes /ws/audio — all WebSocket traffic to audio-service
    - match: Host(`interviewgenie.teckiz.com`) && PathPrefix(`/ws`)
      kind: Rule
      services:
        - name: audio-service
          port: 8000
          nativeLB: true
    - match: Host(`interviewgenie.teckiz.com`)
      kind: Rule
      services:
        - name: api-service
          port: 8001
          nativeLB: true
