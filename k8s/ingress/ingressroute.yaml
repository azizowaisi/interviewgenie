# Traefik IngressRoute: Next.js on main host + API (FastAPI) on path prefixes + WebSocket on /ws
# Order: most specific matches first (Traefik ranks longer rules higher by default).
#
# - https://interviewgenie.teckiz.com/  → Next.js (web:3002) — same as local http://localhost:3002/
# - /ws/*                               → audio-service (WebSocket)
# - /health, /docs, /cv, /topics, …     → api-service (Swagger, Vue /app, Electron REST, etc.)
#
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: interview-ai-http
  namespace: interview-ai
spec:
  entryPoints:
    - web
    - websecure
  tls:
    certResolver: le
    domains:
      - main: interviewgenie.teckiz.com
  routes:
    # WebSocket pipeline (Electron / clients)
    - match: Host(`interviewgenie.teckiz.com`) && PathPrefix(`/ws`)
      kind: Rule
      services:
        - name: audio-service
          port: 8000
          nativeLB: true

    # FastAPI: REST, Swagger, legacy Vue workspace (/app), static bundles — do not use PathPrefix(`/api`) here (Next BFF uses /api/*)
    - match: Host(`interviewgenie.teckiz.com`) && (PathPrefix(`/health`) || PathPrefix(`/docs`) || PathPrefix(`/openapi.json`) || PathPrefix(`/redoc`) || PathPrefix(`/cv`) || PathPrefix(`/sessions`) || PathPrefix(`/history`) || PathPrefix(`/topics`) || PathPrefix(`/attempts`) || PathPrefix(`/ats`) || PathPrefix(`/users`) || PathPrefix(`/static`) || PathPrefix(`/assets`) || PathPrefix(`/app`))
      kind: Rule
      services:
        - name: api-service
          port: 8001
          nativeLB: true

    # Next.js: marketing + interview UI + /api/app, /api/audio, /api/mon, /_next, …
    - match: Host(`interviewgenie.teckiz.com`)
      kind: Rule
      services:
        - name: web
          port: 3002
          nativeLB: true
