# Traefik IngressRoute: Next.js owns / and /api/app, /api/mon, …; backends under /api/svc + /api/audio.
# Order: most specific matches first (Traefik ranks longer rules higher by default).
#
# - https://interviewgenie.example.com/         → Next.js (web:3002) — same as local http://localhost:3002/
# - /ws/*                                        → audio-service (WebSocket)
# - /api/audio/*  (strip /api/audio)             → audio-service HTTP (/mock/*, /health, …)
# - /api/svc/*    (strip /api/svc)               → api-service FastAPI (/health, /docs, /topics, …)
#
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: interview-ai-http
  namespace: interview-ai
spec:
  entryPoints:
    - web
    - websecure
  tls:
    certResolver: le
    domains:
      - main: interviewgenie.example.com
  routes:
    # WebSocket pipeline (Electron / clients)
    - match: Host(`interviewgenie.example.com`) && PathPrefix(`/ws`)
      kind: Rule
      services:
        - name: audio-service
          port: 8000
          nativeLB: true

    # Audio: REST (mock/*, health) — same public prefix the Next BFF uses; Traefik sends here directly.
    - match: Host(`interviewgenie.example.com`) && PathPrefix(`/api/audio`)
      kind: Rule
      middlewares:
        - name: strip-api-audio
      services:
        - name: audio-service
          port: 8000
          nativeLB: true

    # FastAPI: REST, Swagger, Vue workspace (/app), /assets — public base path /api/svc
    - match: Host(`interviewgenie.example.com`) && PathPrefix(`/api/svc`)
      kind: Rule
      middlewares:
        - name: strip-api-svc
      services:
        - name: api-service
          port: 8001
          nativeLB: true

    # Next.js: marketing + interview UI + /api/app, /api/mon, /api/start-interview, /api/evaluate, /_next, …
    - match: Host(`interviewgenie.example.com`)
      kind: Rule
      services:
        - name: web
          port: 3002
          nativeLB: true
