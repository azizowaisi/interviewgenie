# Strip public path prefixes before forwarding to cluster services (see ingressroute.yaml).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-svc
  namespace: interview-ai
spec:
  stripPrefix:
    prefixes:
      - /api/svc
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-audio
  namespace: interview-ai
spec:
  stripPrefix:
    prefixes:
      - /api/audio
