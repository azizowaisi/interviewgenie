apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: interview-ai
  labels:
    app: mongo
spec:
  ports:
    - port: 27017
      targetPort: 27017
      name: mongo
  selector:
    app: mongo
  # Standard ClusterIP (default). Do not flip headless ↔ ClusterIP on a live cluster:
  # Kubernetes forbids changing spec.clusterIP once the Service exists.
