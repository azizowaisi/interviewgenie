apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: interview-ai
  labels:
    app: mongo
spec:
  serviceName: mongo
  replicas: 1
  # Keep PVCs/PVs when StatefulSet is deleted or scaled to 0 (Kubernetes 1.27+).
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 27017
              name: mongo
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
  # Fresh cluster only: create PVC at 5Gi.
  # This cannot be applied to an existing StatefulSet (volumeClaimTemplates are immutable).
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
