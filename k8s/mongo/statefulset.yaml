apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: interview-ai
  labels:
    app: mongo
spec:
  serviceName: mongo
  replicas: 1
  # Keep PVCs/PVs when StatefulSet is deleted or scaled to 0 (Kubernetes 1.27+).
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          # Use 8.0.x line to upgrade from FCV 7.0 on-disk; `mongo:8` may track 8.2+ which rejects FCV 7.0 without prior upgrade.
          image: mongo:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 27017
              name: mongo
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        # volumeClaimTemplates are immutable after create; default SC + 10Gi keeps `kubectl apply -k` working.
        resources:
          requests:
            storage: 10Gi
