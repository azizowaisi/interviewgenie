# Must be applied to kube-system (not via kustomize namespace: interview-ai).
# Use: kubectl apply -f k8s/traefik/helmchartconfig.yaml
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    ports:
      web:
        redirectTo:
          port: websecure
    certificatesResolvers:
      le:
        acme:
          # Set this to your real email (or override via GitHub secret LETSENCRYPT_EMAIL in CI deploy).
          email: you@example.com
          storage: /data/acme.json
          tlsChallenge: true
    persistence:
      enabled: true
      name: data
      size: 1Gi
      path: /data
