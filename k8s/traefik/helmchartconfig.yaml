apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |
    ports:
      web:
        redirectTo:
          port: websecure
    additionalArguments:
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Optional: GitHub secret LETSENCRYPT_EMAIL overrides this during SSH deploy
      - "--certificatesresolvers.le.acme.email=azizowaisi@teckiz.com"
      - "--certificatesresolvers.le.acme.storage=/data/acme.json"
      # TLS-ALPN-01 on :443 (HTTP-01 on :80 breaks when web entrypoint redirects to HTTPS)
      - "--certificatesresolvers.le.acme.tlschallenge=true"
    persistence:
      enabled: true
      name: data
      size: 1Gi
      path: /data
