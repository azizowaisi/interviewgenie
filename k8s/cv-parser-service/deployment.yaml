apiVersion: apps/v1
kind: Deployment
metadata:
  name: cv-parser-service
  namespace: interview-ai
  labels:
    app: cv-parser-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: cv-parser-service
  template:
    metadata:
      labels:
        app: cv-parser-service
    spec:
      containers:
        - name: cv-parser-service
          image: azizowaisi/interview-ai-cv-parser-service:sha-0000000
          imagePullPolicy: IfNotPresent
          env:
            - name: PDF_PARSE_MAX_PAGES
              value: "4"
            - name: PDF_OCR_ENABLED
              value: "false"
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
