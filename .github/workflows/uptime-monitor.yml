name: Production Uptime Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-public-uptime:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Check production public health
        env:
          PUBLIC_URL: ${{ vars.PROD_PUBLIC_URL || 'https://interviewgenie.teckiz.com' }}
          MAX_ATTEMPTS: "3"
          SLEEP_SECONDS: "5"
          CURL_TIMEOUT: "12"
        run: |
          chmod +x scripts/ci/check-public-health.sh
          scripts/ci/check-public-health.sh
