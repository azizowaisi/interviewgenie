# Desktop installers only — independent from Docker image build / Kubernetes deploy (see build-and-deploy.yml).
#
# Triggers when the Next.js app or Electron client changes on `main`, or manually.
# Builds macOS / Windows / Linux artifacts, then optionally rsyncs them to a static directory
# (VM volume, nginx docroot, etc.). rsync --delete removes previous installers on the target that
# are no longer produced.
#
# Configure (repository Variable + Secret):
#   DESKTOP_INSTALLERS_RSYNC_DEST — e.g. deploy@files.example.com:/srv/interviewgenie/desktop/
#   DESKTOP_INSTALLERS_SSH_PORT — optional (default 22 in script)
#   Secret DESKTOP_INSTALLERS_SSH_PRIVATE_KEY — SSH private key for that user
#
# Point the web app at those URLs with NEXT_PUBLIC_DESKTOP_DOWNLOAD_* or JSON at build/deploy time
# (same filenames: InterviewGenie-macos.dmg, InterviewGenie-windows.exe, InterviewGenie-linux.AppImage).
#
# Optional vars: DESKTOP_DOWNLOAD_PAGE (for desktop-latest.json), DESKTOP_MIN_VERSION (oldest supported app; below = mandatory update banner).

name: Desktop installers

on:
  push:
    branches: [main]
    paths:
      - "clients/electron-app/**"
      - "web/**"
  workflow_dispatch:

concurrency:
  group: desktop-installers-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-desktop-installers:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: mac
            asset: InterviewGenie-macos.dmg
          - runner: windows-latest
            target: win
            asset: InterviewGenie-windows.exe
          - runner: ubuntu-24.04
            target: linux
            asset: InterviewGenie-linux.AppImage
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/electron-app/package-lock.json

      # AppImage tooling on Ubuntu runners (without this, --linux often fails).
      - name: Linux packages for electron-builder (AppImage)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils \
            rpm \
            squashfs-tools \
            fakeroot \
            dpkg \
            desktop-file-utils \
            libfuse2t64

      # electron-builder downloads https://github.com/electron/electron/releases/... — runners sometimes
      # hit transient "network is unreachable" / 429. Cache + retries avoid most flakes.
      - name: Cache Electron download (@electron/get)
        uses: actions/cache@v4
        with:
          path: clients/electron-app/.electron-cache
          key: electron-cache-${{ matrix.target }}-${{ hashFiles('clients/electron-app/package-lock.json') }}
          restore-keys: |
            electron-cache-${{ matrix.target }}-

      - name: Build desktop installer (${{ matrix.target }})
        env:
          ELECTRON_CACHE: ${{ github.workspace }}/clients/electron-app/.electron-cache
        run: |
          set -euo pipefail
          cd clients/electron-app
          mkdir -p .electron-cache
          npm ci

          retry_builder() {
            local attempt=1 max=3 delay=25
            while [ "$attempt" -le "$max" ]; do
              if "$@"; then
                return 0
              fi
              if [ "$attempt" -eq "$max" ]; then
                return 1
              fi
              echo "electron-builder failed (attempt ${attempt}/${max}); retrying in ${delay}s..."
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay + 20))
            done
          }

          case "${{ matrix.target }}" in
            mac) retry_builder npx electron-builder --publish never --mac ;;
            win) retry_builder npx electron-builder --publish never --win ;;
            linux) retry_builder npx electron-builder --publish never --linux ;;
            *) echo "Unknown target"; exit 1 ;;
          esac

          if [ ! -f "dist/${{ matrix.asset }}" ]; then
            echo "::error::Expected dist/${{ matrix.asset }} missing. Contents of dist/:"
            ls -la dist/ || true
            exit 1
          fi

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: desktop-installer-${{ matrix.target }}
          path: clients/electron-app/dist/${{ matrix.asset }}
          if-no-files-found: error

  publish:
    needs: [build-desktop-installers]
    if: needs.build-desktop-installers.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Download merged installers
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-installer-*
          path: "${{ github.workspace }}/_desktop_out"
          merge-multiple: true

      - name: List installers
        run: ls -la "${{ github.workspace }}/_desktop_out"

      - name: Write desktop-latest.json (in-app update checks)
        env:
          DESKTOP_DOWNLOAD_PAGE: ${{ vars.DESKTOP_DOWNLOAD_PAGE }}
          DESKTOP_MIN_VERSION: ${{ vars.DESKTOP_MIN_VERSION }}
        run: node scripts/ci/write-desktop-latest-manifest.mjs "${{ github.workspace }}/_desktop_out/desktop-latest.json"

      - name: Install rsync + ssh client
        if: ${{ vars.DESKTOP_INSTALLERS_RSYNC_DEST != '' }}
        run: sudo apt-get update && sudo apt-get install -y rsync openssh-client

      - name: Publish to static volume (rsync --delete)
        if: ${{ vars.DESKTOP_INSTALLERS_RSYNC_DEST != '' }}
        env:
          STAGING_DIR: ${{ github.workspace }}/_desktop_out
          RSYNC_DEST: ${{ vars.DESKTOP_INSTALLERS_RSYNC_DEST }}
          SSH_PORT: ${{ vars.DESKTOP_INSTALLERS_SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.DESKTOP_INSTALLERS_SSH_PRIVATE_KEY }}
        run: bash scripts/ci/gha-publish-desktop-installers-rsync.sh

      - name: Workflow artifact (retention)
        uses: actions/upload-artifact@v4
        with:
          name: desktop-installers-bundle-${{ github.sha }}
          path: ${{ github.workspace }}/_desktop_out/

      - name: Summary
        run: |
          {
            echo "### Desktop installers"
            echo "- **Artifact:** desktop-installers-bundle-${{ github.sha }}"
            if [ -z "${{ vars.DESKTOP_INSTALLERS_RSYNC_DEST }}" ]; then
              echo "- **Volume rsync:** not configured — set repository variable \`DESKTOP_INSTALLERS_RSYNC_DEST\` and secret \`DESKTOP_INSTALLERS_SSH_PRIVATE_KEY\`."
            else
              echo "- **Volume rsync:** ran with \`DESKTOP_INSTALLERS_RSYNC_DEST\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
