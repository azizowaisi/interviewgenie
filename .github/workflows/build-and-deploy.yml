# Push to main + manual dispatch — tests (when relevant), conditional image build/push, deploy.
# Desktop installers are not part of this repo’s CI/CD anymore.
# PR validation: ci.yml (may push pr-<#>-<headSha> for tests/cache — not for production deploy).
# Authoritative images for deploy: this workflow’s sha-<mergeCommit> tags on Docker Hub after merge.
#
# Deploy modes — read from repository VARIABLE `DEPLOY_MODE` first; if empty, from secret `DEPLOY_MODE` (same names).
# Other settings: optional same-named repository Variables when the secret is empty — `secrets.* || vars.*`
#   (SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, LETSENCRYPT_EMAIL, DOCKERHUB_USERNAME). DOCKERHUB_TOKEN: secret only.
# Modes:
#   (unset / empty) — remote kubectl if KUBE_CONFIG is set; else SSH deploy if SSH_* secrets are set
#   remote          — same as unset (needs KUBE_CONFIG for GitHub-hosted kubectl)
#   self_hosted     — Runner on the k3s node
#   ssh             — SSH + rsync + kubectl on VM (always use SSH path even if KUBE_CONFIG exists)
#   none | off      — Docker push only; skip all deploy jobs
#
# Manual dispatch:
#   deploy_only    — apply k8s only (skip tests & Docker; cluster keeps current images)
#   force_build    — build & push all eight images (default off: use path filter like push-to-main)
#   amd64_only     — Docker build/push linux/amd64 only (UNSAFE for this cluster — all nodes are arm64)
#   skip_tests / skip_deploy — unchanged
# Optional repo Variable CI_DOCKER_PLATFORMS (e.g. linux/amd64) — default multi-arch if unset; manual amd64_only wins.
#
# See docs/DEPLOY-GIT-K8S.md, docs/GITHUB-ACTIONS-K8S-OIDC.md
#
# Optional repository Variables:
#   K8S_SKIP_OLLAMA_PULL = true — skip ollama model pull after apply (faster when model already present).
#   K8S_AUTO_RECOVER_IMAGE_PULL = true — after deploy, if ImagePullBackOff/ErrImagePull, run k8s-recover-stuck-rollouts.sh --apply.
#   K8S_RESTART_MONGO_ON_DEPLOY = true — optional; if set, restart MongoDB StatefulSet after updating image pull secrets.

name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_only:
        description: "Only kubectl apply (skip tests & Docker builds)"
        type: boolean
        default: false
      force_build:
        description: "Build & push all images (ignored if deploy_only; leave off for path-based incremental builds)"
        type: boolean
        default: false
      skip_tests:
        description: "Skip Python unit tests"
        type: boolean
        default: false
      skip_deploy:
        description: "Push images only; do not run deploy jobs"
        type: boolean
        default: false
      amd64_only:
        description: "Faster Docker: linux/amd64 only (UNSAFE — cluster nodes are arm64)"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-main
  cancel-in-progress: true

permissions:
  contents: read
  actions: write # BuildKit GHA cache (docker/buildx)
  id-token: write # optional OIDC to cloud (EKS/GKE/AKS); see docs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect:
    runs-on: ubuntu-24.04
    outputs:
      deploy_mode: ${{ steps.deploy_mode.outputs.deploy_mode }}
      build_any: ${{ steps.resolve.outputs.build_any }}
      tests_any: ${{ steps.resolve.outputs.tests_any }}
      build_matrix_slugs: ${{ steps.resolve.outputs.build_matrix_slugs }}
      build_api_service: ${{ steps.resolve.outputs.build_api_service }}
      build_audio_service: ${{ steps.resolve.outputs.build_audio_service }}
      build_stt_service: ${{ steps.resolve.outputs.build_stt_service }}
      build_question_service: ${{ steps.resolve.outputs.build_question_service }}
      build_llm_service: ${{ steps.resolve.outputs.build_llm_service }}
      build_formatter_service: ${{ steps.resolve.outputs.build_formatter_service }}
      build_monitoring_service: ${{ steps.resolve.outputs.build_monitoring_service }}
      build_web: ${{ steps.resolve.outputs.build_web }}
      test_matrix_services: ${{ steps.resolve.outputs.test_matrix_services }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Make CI scripts executable
        run: chmod +x scripts/ci/gha-resolve-detect-outputs.sh

      # Always run (do not skip): downstream env must read steps.filter.outputs; deploy_only/force_build are applied in resolve script.
      - name: Paths filter
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api_service:
              - 'backend/api-service/**'
            audio_service:
              - 'backend/audio-service/**'
            stt_service:
              - 'backend/stt-service/**'
            question_service:
              - 'backend/question-service/**'
            llm_service:
              - 'backend/llm-service/**'
            formatter_service:
              - 'backend/formatter-service/**'
            monitoring_service:
              - 'backend/monitoring-service/**'
            web:
              - 'web/**'
            python_tests:
              - 'backend/question-service/**'
              - 'backend/formatter-service/**'
              - 'backend/llm-service/**'
              - 'backend/stt-service/**'
              - 'backend/audio-service/**'

      # Variable wins over secret so you can override without deleting the secret.
      - name: Resolve DEPLOY_MODE (vars.DEPLOY_MODE or secrets.DEPLOY_MODE)
        id: deploy_mode
        env:
          VAR_DEPLOY_MODE: ${{ vars.DEPLOY_MODE }}
          SECRET_DEPLOY_MODE: ${{ secrets.DEPLOY_MODE }}
        run: |
          set -euo pipefail
          trim() { printf '%s' "$1" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'; }
          v="$(trim "${VAR_DEPLOY_MODE:-}")"
          s="$(trim "${SECRET_DEPLOY_MODE:-}")"
          if [ -n "$v" ]; then m="$v"; else m="$s"; fi
          m="$(printf '%s' "$m" | tr '[:upper:]' '[:lower:]')"
          echo "deploy_mode=${m}" >> "$GITHUB_OUTPUT"

      - name: Resolve build / test flags
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          # Short-circuit avoids evaluating workflow_dispatch inputs on push events
          INPUT_DEPLOY_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_only == true && 'true' || 'false' }}
          INPUT_FORCE_BUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.force_build == true && 'true' || 'false' }}
          INPUT_SKIP_TESTS: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_tests == true && 'true' || 'false' }}
          CI_ALWAYS_BUILD_ALL: ${{ vars.CI_ALWAYS_BUILD_ALL }}
          FILTER_API_SERVICE: ${{ steps.filter.outputs.api_service }}
          FILTER_AUDIO_SERVICE: ${{ steps.filter.outputs.audio_service }}
          FILTER_STT_SERVICE: ${{ steps.filter.outputs.stt_service }}
          FILTER_QUESTION_SERVICE: ${{ steps.filter.outputs.question_service }}
          FILTER_LLM_SERVICE: ${{ steps.filter.outputs.llm_service }}
          FILTER_FORMATTER_SERVICE: ${{ steps.filter.outputs.formatter_service }}
          FILTER_MONITORING_SERVICE: ${{ steps.filter.outputs.monitoring_service }}
          FILTER_WEB: ${{ steps.filter.outputs.web }}
          FILTER_PYTHON_TESTS: ${{ steps.filter.outputs.python_tests }}
        run: bash scripts/ci/gha-resolve-detect-outputs.sh

  test:
    needs: detect
    if: |
      always() &&
      needs.detect.outputs.tests_any == 'true' &&
      (github.event_name != 'workflow_dispatch' || inputs.skip_tests != 'true')
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect.outputs.test_matrix_services) }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/${{ matrix.service }}/requirements.txt

      - name: Pytest (${{ matrix.service }})
        run: |
          pip install -q -r "backend/${{ matrix.service }}/requirements.txt"
          (cd "backend/${{ matrix.service }}" && python -m pytest tests/ -q --tb=short)

  # When build_any: platforms + Docker Hub check (no login here — each matrix leg logs in).
  build-prep:
    needs: [detect, test]
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        github.event_name == 'workflow_dispatch'
      ) &&
      (github.event_name != 'workflow_dispatch' || inputs.deploy_only != 'true') &&
      needs.detect.outputs.build_any == 'true'
    runs-on: ubuntu-24.04
    outputs:
      platforms: ${{ steps.plat.outputs.platforms }}
      need_qemu: ${{ steps.plat.outputs.need_qemu }}
      dh_skip: ${{ steps.dh.outputs.skip }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure Docker platforms
        id: plat
        env:
          AMD64_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.amd64_only == true && 'true' || 'false' }}
          CI_DOCKER_PLATFORMS: ${{ vars.CI_DOCKER_PLATFORMS }}
        run: |
          set -euo pipefail
          if [ "${AMD64_ONLY}" = "true" ]; then
            P="linux/amd64"
          elif [ -n "${CI_DOCKER_PLATFORMS:-}" ]; then
            P="${CI_DOCKER_PLATFORMS}"
          else
            P="linux/amd64,linux/arm64"
          fi
          echo "platforms=${P}" >> "$GITHUB_OUTPUT"
          case ",${P}," in
            *,linux/arm64,*|*,arm64,*) echo "need_qemu=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "need_qemu=false" >> "$GITHUB_OUTPUT" ;;
          esac
          echo "Using PLATFORMS=${P}" >> "$GITHUB_STEP_SUMMARY"

      - name: Check Docker Hub credentials
        id: dh
        env:
          DH_USER_SECRET: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_USER_VAR: ${{ vars.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "${DH_TOKEN}" ]; then
            echo "No DOCKERHUB_TOKEN — skipping parallel image builds; deploy will not change images."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          trim() { printf '%s' "$1" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'; }
          DH_USER="$(trim "${DH_USER_SECRET}")"
          [ -z "${DH_USER}" ] && DH_USER="$(trim "${DH_USER_VAR}")"
          DH_TOKEN="$(trim "${DH_TOKEN}")"
          if [ -z "${DH_USER}" ]; then
            echo "::error::DOCKERHUB_USERNAME is empty. Set repository **Actions secret** DOCKERHUB_USERNAME or **variable** DOCKERHUB_USERNAME (Docker Hub user / org name)."
            exit 1
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js (web quality gate)
        if: steps.dh.outputs.skip != 'true' && needs.detect.outputs.build_web == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Dockerfile skips eslint so multi-arch web builds do not run lint per platform.
      - name: ESLint & Vitest (web only)
        if: steps.dh.outputs.skip != 'true' && needs.detect.outputs.build_web == 'true'
        run: |
          cd web
          npm ci
          npm run lint
          npm run test:bff

  # One image per matrix leg (parallel runners). GHA + registry cache per slug (same as serial script).
  build-images:
    needs: [detect, test, build-prep]
    timeout-minutes: 45
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        github.event_name == 'workflow_dispatch'
      ) &&
      (github.event_name != 'workflow_dispatch' || inputs.deploy_only != 'true') &&
      needs.detect.outputs.build_any == 'true' &&
      needs.build-prep.result == 'success' &&
      needs.build-prep.outputs.dh_skip != 'true'
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        slug: ${{ fromJson(needs.detect.outputs.build_matrix_slugs) }}
    # Web uses a native arm64 runner — no QEMU, no SIGILL with Node 22.
    # Other services (Python) use the standard amd64 runner.
    runs-on: ${{ matrix.slug == 'web' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    env:
      IMAGE_TAG: sha-${{ github.sha }}
      PLATFORMS: ${{ needs.build-prep.outputs.platforms }}
      # Avoid attestations that appear as unknown/unknown in manifest lists (easier to verify arm64).
      BUILDX_NO_DEFAULT_ATTESTATIONS: 1
      ENABLE_REGISTRY_CACHE: ${{ vars.DOCKER_REGISTRY_CACHE != 'false' && 'true' || 'false' }}
      WEB_PUBLIC_APP_URL: ${{ vars.WEB_PUBLIC_APP_URL }}
      WEB_ADMIN_SITE_URL: ${{ vars.WEB_ADMIN_SITE_URL }}
      WEB_ADMIN_HOSTS: ${{ vars.WEB_ADMIN_HOSTS }}
      WEB_MAIN_APP_HOSTS: ${{ vars.WEB_MAIN_APP_HOSTS }}
      AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN || vars.AUTH0_DOMAIN }}
      AUTH0_ISSUER_BASE_URL: ${{ secrets.AUTH0_ISSUER_BASE_URL || vars.AUTH0_ISSUER_BASE_URL }}
      AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID || vars.AUTH0_CLIENT_ID }}
      AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET || vars.AUTH0_CLIENT_SECRET }}
      AUTH0_SECRET: ${{ secrets.AUTH0_SECRET || vars.AUTH0_SECRET }}
      AUTH0_BASE_URL: ${{ secrets.AUTH0_BASE_URL || vars.AUTH0_BASE_URL }}
      APP_BASE_URL: ${{ secrets.APP_BASE_URL || vars.APP_BASE_URL }}
      # Web-only: set to linux/amd64 if all K8s nodes are amd64 — skips arm64/QEMU (major speedup).
      WEB_DOCKER_PLATFORMS: ${{ vars.WEB_DOCKER_PLATFORMS }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        # Skip for web: it runs on a native arm64 runner (ubuntu-24.04-arm) — no emulation needed.
        # Also skip when WEB_DOCKER_PLATFORMS is amd64-only (no arm64 to emulate).
        if: |
          needs.build-prep.outputs.need_qemu == 'true' &&
          matrix.slug != 'web'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        env:
          DH_USER_SECRET: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_USER_VAR: ${{ vars.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          trim() { printf '%s' "$1" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'; }
          DH_USER="$(trim "${DH_USER_SECRET}")"
          [ -z "${DH_USER}" ] && DH_USER="$(trim "${DH_USER_VAR}")"
          if [ -z "${DH_USER}" ]; then
            echo "::error::DOCKERHUB_USERNAME empty — set Actions secret or variable (matrix jobs do not inherit build-prep username output reliably)."
            exit 1
          fi
          if [ -z "${DH_TOKEN}" ]; then
            echo "::error::DOCKERHUB_TOKEN missing for docker login."
            exit 1
          fi
          printf '%s' "${DH_TOKEN}" | docker login -u "${DH_USER}" --password-stdin

      - name: Build & push image (single service; see docs/DEPLOY-SPEED.md)
        id: docker_push
        env:
          IMAGE_SLUG: ${{ matrix.slug }}
          DH_USER_SECRET: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_USER_VAR: ${{ vars.DOCKERHUB_USERNAME }}
        run: |
          trim() { printf '%s' "$1" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'; }
          DH_USER="$(trim "${DH_USER_SECRET}")"
          [ -z "${DH_USER}" ] && DH_USER="$(trim "${DH_USER_VAR}")"
          export DH_USER
          if [ -z "${DH_USER}" ]; then
            echo "::error::DOCKERHUB_USERNAME empty — set Actions secret or variable."
            exit 1
          fi
          chmod +x scripts/ci/gha-build-single-image.sh
          scripts/ci/gha-build-single-image.sh

      - name: Record push result artifact
        if: always()
        run: |
          if [ "${{ steps.docker_push.outcome }}" = "success" ]; then
            echo 1 > pushed.txt
          else
            echo 0 > pushed.txt
          fi

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: image-push-result-${{ matrix.slug }}
          path: pushed.txt

  # Always run when eligible (even if build_any=false) so outputs stay defined for deploy jobs.
  build-meta:
    needs: [detect, test, build-prep, build-images]
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        github.event_name == 'workflow_dispatch'
      ) &&
      (github.event_name != 'workflow_dispatch' || inputs.deploy_only != 'true')
    runs-on: ubuntu-24.04
    outputs:
      images_pushed: ${{ steps.push_outcome.outputs.images_pushed }}
    steps:
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: image-push-result-*
          path: _push_results

      - name: Aggregate image push outcome
        id: push_outcome
        run: |
          set -euo pipefail
          if [ "${{ needs.detect.outputs.build_any }}" != "true" ]; then
            echo "images_pushed=false" >> "$GITHUB_OUTPUT"
            echo "**No image-affecting changes** — skipping Docker build/push." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ "${{ needs.build-prep.result }}" != "success" ]; then
            echo "images_pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ needs.build-prep.outputs.dh_skip }}" = "true" ]; then
            echo "images_pushed=false" >> "$GITHUB_OUTPUT"
            echo "No Docker Hub token — cluster images unchanged by this run." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ "${{ needs.build-images.result }}" != "success" ]; then
            echo "images_pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          any=0
          if [ -d "_push_results" ]; then
            while IFS= read -r -d '' f; do
              v="$(tr -d ' \n\r\t' < "$f" || true)"
              if [ "$v" = "1" ]; then any=1; break; fi
            done < <(find _push_results -type f \( -name 'pushed.txt' -o -name 'pushed.txt*' \) -print0 2>/dev/null || true)
          fi
          if [ "$any" = "1" ]; then
            echo "images_pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "images_pushed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build summary
        if: always()
        run: |
          echo "### Images (parallel matrix)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag (when built):** \`sha-${{ github.sha }}\` (immutable; no \`:latest\` push)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **build_any:** ${{ needs.detect.outputs.build_any }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **images_pushed:** ${{ steps.push_outcome.outputs.images_pushed }}" >> "$GITHUB_STEP_SUMMARY"

  # Job-level `if` cannot use `secrets.*` (GitHub limitation). Expose booleans here instead.
  deploy_gates:
    needs: [detect, test, build-meta]
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' || inputs.skip_deploy != 'true') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.build-meta.result == 'success' || needs.build-meta.result == 'skipped') &&
      needs.detect.outputs.deploy_mode != 'none' &&
      needs.detect.outputs.deploy_mode != 'off' &&
      needs.detect.outputs.deploy_mode != 'false'
    runs-on: ubuntu-24.04
    outputs:
      has_kube_config: ${{ steps.check.outputs.has_kube_config }}
      has_ssh_bundle: ${{ steps.check.outputs.has_ssh_bundle }}
    steps:
      - id: check
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY || vars.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER || vars.SSH_USER }}
        run: |
          if [ -n "${KUBE_CONFIG_B64}" ]; then echo "has_kube_config=true" >> "$GITHUB_OUTPUT"
          else echo "has_kube_config=false" >> "$GITHUB_OUTPUT"; fi
          if [ -n "${SSH_PRIVATE_KEY}" ] && [ -n "${SSH_HOST}" ] && [ -n "${SSH_USER}" ]; then echo "has_ssh_bundle=true" >> "$GITHUB_OUTPUT"
          else echo "has_ssh_bundle=false" >> "$GITHUB_OUTPUT"; fi

  deploy_remote:
    needs: [detect, test, build-meta, deploy_gates]
    timeout-minutes: 25
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' || inputs.skip_deploy != 'true') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.build-meta.result == 'success' || needs.build-meta.result == 'skipped') &&
      (needs.deploy_gates.result == 'success' || needs.deploy_gates.result == 'skipped') &&
      (needs.detect.outputs.deploy_mode == 'remote' || needs.detect.outputs.deploy_mode == '') &&
      needs.detect.outputs.deploy_mode != 'ssh' &&
      needs.detect.outputs.deploy_mode != 'self_hosted' &&
      needs.detect.outputs.deploy_mode != 'none' &&
      needs.detect.outputs.deploy_mode != 'off' &&
      needs.detect.outputs.deploy_mode != 'false' &&
      needs.deploy_gates.outputs.has_kube_config == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy to cluster (k3s-compatible)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          K8S_AUTO_RECOVER_IMAGE_PULL: ${{ vars.K8S_AUTO_RECOVER_IMAGE_PULL }}
          K8S_SKIP_OLLAMA_PULL: ${{ vars.K8S_SKIP_OLLAMA_PULL }}
        run: |
          chmod +x scripts/ci/k8s-apply.sh
          export KUBECONFIG="$HOME/.kube/config"
          # Pin to immutable sha-<commit> when this run pushed images (partial list = only rebuilt services).
          # No push → skip set image so we never roll the cluster to a missing or stale :latest.
          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            export K8S_SKIP_SET_IMAGE=1
            unset K8S_UPDATE_DEPLOYMENTS || true
            echo "No DOCKERHUB_USERNAME — skipping kubectl set image."
          elif [ "${{ needs.build-meta.result }}" = "success" ] && \
               [ "${{ needs.build-meta.outputs.images_pushed }}" = "true" ] && \
               [ "${{ needs.detect.outputs.build_any }}" = "true" ]; then
            export K8S_SKIP_SET_IMAGE=0
            export K8S_IMAGE_TAG="sha-${{ github.sha }}"
            UPD=""
            [ "${{ needs.detect.outputs.build_api_service }}" = "true" ] && UPD="$UPD api-service"
            [ "${{ needs.detect.outputs.build_audio_service }}" = "true" ] && UPD="$UPD audio-service"
            [ "${{ needs.detect.outputs.build_stt_service }}" = "true" ] && UPD="$UPD stt-service"
            [ "${{ needs.detect.outputs.build_question_service }}" = "true" ] && UPD="$UPD question-service"
            [ "${{ needs.detect.outputs.build_llm_service }}" = "true" ] && UPD="$UPD llm-service"
            [ "${{ needs.detect.outputs.build_formatter_service }}" = "true" ] && UPD="$UPD formatter-service"
            [ "${{ needs.detect.outputs.build_monitoring_service }}" = "true" ] && UPD="$UPD monitoring-service"
            [ "${{ needs.detect.outputs.build_web }}" = "true" ] && UPD="$UPD web"
            export K8S_UPDATE_DEPLOYMENTS="$(echo "${UPD}" | xargs)"
            echo "Pinning to K8S_IMAGE_TAG=${K8S_IMAGE_TAG} deployments=[${K8S_UPDATE_DEPLOYMENTS}]"
          else
            export K8S_SKIP_SET_IMAGE=1
            unset K8S_UPDATE_DEPLOYMENTS || true
            echo "No image push this run — skipping kubectl set image (cluster keeps current image tags)."
          fi
          scripts/ci/k8s-apply.sh

      - name: Rollback hint on failure
        if: failure()
        run: |
          echo "::error::Deploy failed. To roll back one revision: kubectl rollout undo deployment/<name> -n interview-ai"

  deploy_self_hosted:
    needs: [detect, test, build-meta]
    timeout-minutes: 30
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' || inputs.skip_deploy != 'true') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.build-meta.result == 'success' || needs.build-meta.result == 'skipped') &&
      needs.detect.outputs.deploy_mode == 'self_hosted'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - name: Ensure kubectl
        run: |
          command -v kubectl >/dev/null 2>&1 && exit 0
          sudo ln -sf /usr/local/bin/kubectl /usr/bin/kubectl 2>/dev/null || true
          command -v kubectl >/dev/null 2>&1 && exit 0
          sudo k3s kubectl version --client=true

      - name: k3s kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          sudo cat /etc/rancher/k3s/k3s.yaml > "$HOME/.kube/config"
          sudo chown "$(id -u):$(id -g)" "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy to cluster
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          K8S_AUTO_RECOVER_IMAGE_PULL: ${{ vars.K8S_AUTO_RECOVER_IMAGE_PULL }}
          K8S_SKIP_OLLAMA_PULL: ${{ vars.K8S_SKIP_OLLAMA_PULL }}
        run: |
          chmod +x scripts/ci/k8s-apply.sh
          export KUBECONFIG="$HOME/.kube/config"
          # Same as deploy_remote: sha-<commit> when images pushed; else skip set image (no :latest rollout).
          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            export K8S_SKIP_SET_IMAGE=1
            unset K8S_UPDATE_DEPLOYMENTS || true
            echo "No DOCKERHUB_USERNAME — skipping kubectl set image."
          elif [ "${{ needs.build-meta.result }}" = "success" ] && \
               [ "${{ needs.build-meta.outputs.images_pushed }}" = "true" ] && \
               [ "${{ needs.detect.outputs.build_any }}" = "true" ]; then
            export K8S_SKIP_SET_IMAGE=0
            export K8S_IMAGE_TAG="sha-${{ github.sha }}"
            UPD=""
            [ "${{ needs.detect.outputs.build_api_service }}" = "true" ] && UPD="$UPD api-service"
            [ "${{ needs.detect.outputs.build_audio_service }}" = "true" ] && UPD="$UPD audio-service"
            [ "${{ needs.detect.outputs.build_stt_service }}" = "true" ] && UPD="$UPD stt-service"
            [ "${{ needs.detect.outputs.build_question_service }}" = "true" ] && UPD="$UPD question-service"
            [ "${{ needs.detect.outputs.build_llm_service }}" = "true" ] && UPD="$UPD llm-service"
            [ "${{ needs.detect.outputs.build_formatter_service }}" = "true" ] && UPD="$UPD formatter-service"
            [ "${{ needs.detect.outputs.build_monitoring_service }}" = "true" ] && UPD="$UPD monitoring-service"
            [ "${{ needs.detect.outputs.build_web }}" = "true" ] && UPD="$UPD web"
            export K8S_UPDATE_DEPLOYMENTS="$(echo "${UPD}" | xargs)"
            echo "Pinning to K8S_IMAGE_TAG=${K8S_IMAGE_TAG} deployments=[${K8S_UPDATE_DEPLOYMENTS}]"
          else
            export K8S_SKIP_SET_IMAGE=1
            unset K8S_UPDATE_DEPLOYMENTS || true
            echo "No image push this run — skipping kubectl set image (cluster keeps current image tags)."
          fi
          scripts/ci/k8s-apply.sh

      - name: Rollback hint on failure
        if: failure()
        run: |
          echo "::error::Deploy failed. To roll back one revision: kubectl rollout undo deployment/<name> -n interview-ai"

  # Explicit DEPLOY_MODE=ssh, OR default/remote with no KUBE_CONFIG but SSH secrets (typical k3s VM).
  deploy_ssh_bootstrap:
    needs: [detect, test, build-meta, deploy_gates]
    timeout-minutes: 45
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' || inputs.skip_deploy != 'true') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.build-meta.result == 'success' || needs.build-meta.result == 'skipped') &&
      (needs.deploy_gates.result == 'success' || needs.deploy_gates.result == 'skipped') &&
      needs.detect.outputs.deploy_mode != 'none' &&
      needs.detect.outputs.deploy_mode != 'off' &&
      needs.detect.outputs.deploy_mode != 'false' &&
      needs.detect.outputs.deploy_mode != 'self_hosted' &&
      (
        needs.detect.outputs.deploy_mode == 'ssh' ||
        (
          (needs.detect.outputs.deploy_mode == 'remote' || needs.detect.outputs.deploy_mode == '') &&
          needs.deploy_gates.outputs.has_kube_config == 'false' &&
          needs.deploy_gates.outputs.has_ssh_bundle == 'true'
        )
      )
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Deploy path
        run: |
          if [ "${{ needs.detect.outputs.deploy_mode }}" = "ssh" ]; then
            echo "Using SSH deploy (DEPLOY_MODE=ssh from variable or secret)."
          else
            echo "Using SSH deploy (auto: no KUBE_CONFIG; DEPLOY_MODE empty/remote + SSH secrets)."
          fi

      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y openssh-client rsync

      - name: Configure SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY || vars.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/id_rsa"
          chmod 600 "$HOME/.ssh/id_rsa"
          ssh-keyscan -H "$SSH_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Sync manifests + apply on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER || vars.SSH_USER }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL || vars.LETSENCRYPT_EMAIL }}
          GITHUB_SHA: ${{ github.sha }}
          K8S_AUTO_RECOVER_IMAGE_PULL: ${{ vars.K8S_AUTO_RECOVER_IMAGE_PULL }}
          K8S_SKIP_OLLAMA_PULL: ${{ vars.K8S_SKIP_OLLAMA_PULL }}
        run: |
          # Same as deploy_remote: sha-<commit> when images pushed; else skip set image (no :latest rollout).
          K8S_UPDATE_DEPLOYMENTS=""
          K8S_SKIP_SET_IMAGE="1"
          if [ -n "${DOCKERHUB_USERNAME}" ] && \
             [ "${{ needs.build-meta.result }}" = "success" ] && \
             [ "${{ needs.build-meta.outputs.images_pushed }}" = "true" ] && \
             [ "${{ needs.detect.outputs.build_any }}" = "true" ]; then
            K8S_SKIP_SET_IMAGE="0"
            K8S_IMAGE_TAG="sha-${GITHUB_SHA}"
            UPD=""
            [ "${{ needs.detect.outputs.build_api_service }}" = "true" ] && UPD="$UPD api-service"
            [ "${{ needs.detect.outputs.build_audio_service }}" = "true" ] && UPD="$UPD audio-service"
            [ "${{ needs.detect.outputs.build_stt_service }}" = "true" ] && UPD="$UPD stt-service"
            [ "${{ needs.detect.outputs.build_question_service }}" = "true" ] && UPD="$UPD question-service"
            [ "${{ needs.detect.outputs.build_llm_service }}" = "true" ] && UPD="$UPD llm-service"
            [ "${{ needs.detect.outputs.build_formatter_service }}" = "true" ] && UPD="$UPD formatter-service"
            [ "${{ needs.detect.outputs.build_monitoring_service }}" = "true" ] && UPD="$UPD monitoring-service"
            [ "${{ needs.detect.outputs.build_web }}" = "true" ] && UPD="$UPD web"
            K8S_UPDATE_DEPLOYMENTS="$(echo "${UPD}" | xargs)"
          fi
          export K8S_SKIP_SET_IMAGE K8S_IMAGE_TAG K8S_UPDATE_DEPLOYMENTS

          rsync -az --delete -e "ssh -i $HOME/.ssh/id_rsa" ./k8s ./scripts "${SSH_USER}@${SSH_HOST}:~/interviewgenie-k8s/"

          ssh -i "$HOME/.ssh/id_rsa" "${SSH_USER}@${SSH_HOST}" bash -lc "set -euo pipefail
            export DOCKERHUB_USERNAME=\"${DOCKERHUB_USERNAME}\"
            export DOCKERHUB_TOKEN=\"${DOCKERHUB_TOKEN}\"
            export GITHUB_SHA=\"${GITHUB_SHA}\"
            export K8S_SKIP_SET_IMAGE=\"${K8S_SKIP_SET_IMAGE}\"
            export K8S_IMAGE_TAG=\"${K8S_IMAGE_TAG}\"
            export K8S_UPDATE_DEPLOYMENTS=\"${K8S_UPDATE_DEPLOYMENTS}\"
            export K8S_AUTO_RECOVER_IMAGE_PULL=\"${K8S_AUTO_RECOVER_IMAGE_PULL}\"
            export K8S_SKIP_OLLAMA_PULL=\"${K8S_SKIP_OLLAMA_PULL}\"
            LE_MAIL=\"${LETSENCRYPT_EMAIL}\"

            if ! command -v curl >/dev/null 2>&1; then
              if command -v dnf >/dev/null 2>&1; then sudo dnf install -y curl
              elif command -v apt-get >/dev/null 2>&1; then sudo apt-get update && sudo apt-get install -y curl
              else echo 'Install curl manually'; exit 1; fi
            fi
            if ! command -v docker >/dev/null 2>&1; then
              if command -v dnf >/dev/null 2>&1; then sudo dnf install -y docker && sudo systemctl enable --now docker || true
              elif command -v apt-get >/dev/null 2>&1; then sudo apt-get update && sudo apt-get install -y docker.io && sudo usermod -aG docker \$USER || true
              fi
            fi

            if ! command -v k3s >/dev/null 2>&1; then curl -sfL https://get.k3s.io | sh -; fi
            sudo /usr/local/bin/kubectl get nodes 2>/dev/null || sudo k3s kubectl get nodes

            mkdir -p \$HOME/.kube
            sudo cat /etc/rancher/k3s/k3s.yaml > \$HOME/.kube/config
            sudo chown \$(id -u):\$(id -g) \$HOME/.kube/config
            chmod 600 \$HOME/.kube/config
            export KUBECONFIG=\$HOME/.kube/config

            if [ -n \"\${DOCKERHUB_USERNAME}\" ] && [ -n \"\${DOCKERHUB_TOKEN}\" ]; then
              printf '%s' \"\${DOCKERHUB_TOKEN}\" | docker login -u \"\${DOCKERHUB_USERNAME}\" --password-stdin
            fi

            if [ -n \"\${LE_MAIL}\" ]; then
              sed -i \"s|azizowaisi@teckiz.com|\${LE_MAIL}|g\" \$HOME/interviewgenie-k8s/k8s/traefik/helmchartconfig.yaml || true
            fi

            chmod +x \$HOME/interviewgenie-k8s/scripts/ci/k8s-apply.sh
            bash \$HOME/interviewgenie-k8s/scripts/ci/k8s-apply.sh
          "
