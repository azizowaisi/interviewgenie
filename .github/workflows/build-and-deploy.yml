# Push to main + manual dispatch — tests (when relevant), conditional image build/push, deploy.
# PR validation: ci.yml
#
# Deploy modes (repo variable DEPLOY_MODE):
#   (unset / empty) — same as remote: full k8s deploy (kubectl apply + roll workloads) — DEFAULT
#   remote          — GitHub-hosted runner + secret KUBE_CONFIG
#   self_hosted     — Runner on the k3s node
#   ssh             — SSH + rsync + kubectl on VM
#   none | off      — Docker push only; skip all deploy jobs
#
# Manual dispatch:
#   deploy_only    — apply k8s only (skip tests & Docker; cluster keeps current images)
#   force_build    — build & push every image (default true when not deploy_only)
#   skip_tests / skip_deploy — unchanged
#
# See docs/DEPLOY-GIT-K8S.md, docs/GITHUB-ACTIONS-K8S-OIDC.md

name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_only:
        description: "Only kubectl apply (skip tests & Docker builds)"
        type: boolean
        default: false
      force_build:
        description: "Build & push all images (ignored if deploy_only; default true for manual)"
        type: boolean
        default: true
      skip_tests:
        description: "Skip Python unit tests"
        type: boolean
        default: false
      skip_deploy:
        description: "Push images only; do not run deploy jobs"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-main
  cancel-in-progress: true

permissions:
  contents: read
  actions: write # BuildKit GHA cache (docker/buildx)
  id-token: write # optional OIDC to cloud (EKS/GKE/AKS); see docs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect:
    runs-on: ubuntu-24.04
    outputs:
      build_any: ${{ steps.resolve.outputs.build_any }}
      tests_any: ${{ steps.resolve.outputs.tests_any }}
      build_api_service: ${{ steps.resolve.outputs.build_api_service }}
      build_audio_service: ${{ steps.resolve.outputs.build_audio_service }}
      build_stt_service: ${{ steps.resolve.outputs.build_stt_service }}
      build_question_service: ${{ steps.resolve.outputs.build_question_service }}
      build_llm_service: ${{ steps.resolve.outputs.build_llm_service }}
      build_formatter_service: ${{ steps.resolve.outputs.build_formatter_service }}
      build_monitoring_service: ${{ steps.resolve.outputs.build_monitoring_service }}
      build_web: ${{ steps.resolve.outputs.build_web }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Make CI scripts executable
        run: chmod +x scripts/ci/gha-resolve-detect-outputs.sh

      # Always run (do not skip): downstream env must read steps.filter.outputs; deploy_only/force_build are applied in resolve script.
      - name: Paths filter
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api_service:
              - 'backend/api-service/**'
            audio_service:
              - 'backend/audio-service/**'
            stt_service:
              - 'backend/stt-service/**'
            question_service:
              - 'backend/question-service/**'
            llm_service:
              - 'backend/llm-service/**'
            formatter_service:
              - 'backend/formatter-service/**'
            monitoring_service:
              - 'backend/monitoring-service/**'
            web:
              - 'web/**'
            python_tests:
              - 'backend/question-service/**'
              - 'backend/formatter-service/**'
              - 'backend/llm-service/**'
              - 'backend/stt-service/**'
              - 'backend/audio-service/**'

      - name: Resolve build / test flags
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          # Short-circuit avoids evaluating workflow_dispatch inputs on push events
          INPUT_DEPLOY_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_only == true && 'true' || 'false' }}
          INPUT_FORCE_BUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.force_build == true && 'true' || 'false' }}
          INPUT_SKIP_TESTS: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_tests == true && 'true' || 'false' }}
          FILTER_API_SERVICE: ${{ steps.filter.outputs.api_service }}
          FILTER_AUDIO_SERVICE: ${{ steps.filter.outputs.audio_service }}
          FILTER_STT_SERVICE: ${{ steps.filter.outputs.stt_service }}
          FILTER_QUESTION_SERVICE: ${{ steps.filter.outputs.question_service }}
          FILTER_LLM_SERVICE: ${{ steps.filter.outputs.llm_service }}
          FILTER_FORMATTER_SERVICE: ${{ steps.filter.outputs.formatter_service }}
          FILTER_MONITORING_SERVICE: ${{ steps.filter.outputs.monitoring_service }}
          FILTER_WEB: ${{ steps.filter.outputs.web }}
          FILTER_PYTHON_TESTS: ${{ steps.filter.outputs.python_tests }}
        run: bash scripts/ci/gha-resolve-detect-outputs.sh

  test:
    needs: detect
    if: |
      always() &&
      needs.detect.outputs.tests_any == 'true' &&
      (github.event_name != 'workflow_dispatch' || inputs.skip_tests != 'true')
    strategy:
      fail-fast: true
      matrix:
        service: [question-service, formatter-service, llm-service, stt-service, audio-service]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/${{ matrix.service }}/requirements.txt

      - name: Pytest (${{ matrix.service }})
        run: |
          pip install -q -r "backend/${{ matrix.service }}/requirements.txt"
          (cd "backend/${{ matrix.service }}" && python -m pytest tests/ -q --tb=short)

  build-push:
    needs: [detect, test]
    outputs:
      images_pushed: ${{ steps.push_outcome.outputs.images_pushed }}
    # Always run when eligible (even if build_any=false) so job outputs stay defined for deploy.
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        github.event_name == 'workflow_dispatch'
      ) &&
      (github.event_name != 'workflow_dispatch' || inputs.deploy_only != 'true')
    runs-on: ubuntu-24.04
    env:
      IMAGE_TAG: sha-${{ github.sha }}
      BUILD_API_SERVICE: ${{ needs.detect.outputs.build_api_service }}
      BUILD_AUDIO_SERVICE: ${{ needs.detect.outputs.build_audio_service }}
      BUILD_STT_SERVICE: ${{ needs.detect.outputs.build_stt_service }}
      BUILD_QUESTION_SERVICE: ${{ needs.detect.outputs.build_question_service }}
      BUILD_LLM_SERVICE: ${{ needs.detect.outputs.build_llm_service }}
      BUILD_FORMATTER_SERVICE: ${{ needs.detect.outputs.build_formatter_service }}
      BUILD_MONITORING_SERVICE: ${{ needs.detect.outputs.build_monitoring_service }}
      BUILD_WEB: ${{ needs.detect.outputs.build_web }}
    steps:
      - uses: actions/checkout@v6

      - name: Decide whether to build images
        id: decide
        run: |
          if [ "${{ needs.detect.outputs.build_any }}" = "true" ]; then
            echo "run_build=true" >> "$GITHUB_OUTPUT"
            echo "Will build/push changed images only (see detect summary)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "run_build=false" >> "$GITHUB_OUTPUT"
            echo "**No image-affecting changes** — skipping Docker build/push." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Configure Docker platforms
        id: plat
        if: steps.decide.outputs.run_build == 'true'
        env:
          DOCKER_BUILD_PLATFORMS: ${{ vars.DOCKER_BUILD_PLATFORMS }}
        run: |
          P="${DOCKER_BUILD_PLATFORMS:-linux/amd64}"
          echo "platforms=${P}" >> "$GITHUB_OUTPUT"
          if echo "${P}" | grep -q ',' || echo "${P}" | grep -qiE 'arm64|aarch64'; then
            echo "need_qemu=true" >> "$GITHUB_OUTPUT"
          else
            echo "need_qemu=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Using PLATFORMS=${P} (set repo var DOCKER_BUILD_PLATFORMS to override)" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up QEMU
        if: steps.decide.outputs.run_build == 'true' && steps.plat.outputs.need_qemu == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.decide.outputs.run_build == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub (optional)
        id: dh_login
        if: steps.decide.outputs.run_build == 'true'
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "${DH_TOKEN}" ]; then
            echo "No DOCKERHUB_TOKEN — skipping image build/push; deploy will not change images."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DH_USER="$(printf '%s' "${DH_USER}" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          DH_TOKEN="$(printf '%s' "${DH_TOKEN}" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          if [ -z "${DH_USER}" ]; then
            echo "DOCKERHUB_USERNAME empty"; exit 1
          fi
          printf '%s' "${DH_TOKEN}" | docker login -u "${DH_USER}" --password-stdin
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "dh_user=${DH_USER}" >> "$GITHUB_OUTPUT"

      - name: Build & push images (registry + GHA cache; see docs/DEPLOY-SPEED.md)
        id: docker_push
        if: steps.decide.outputs.run_build == 'true' && steps.dh_login.outputs.skip == 'false'
        env:
          DH_USER: ${{ steps.dh_login.outputs.dh_user }}
          PLATFORMS: ${{ steps.plat.outputs.platforms }}
          ENABLE_REGISTRY_CACHE: ${{ vars.DOCKER_REGISTRY_CACHE != 'false' && 'true' || 'false' }}
          WEB_PUBLIC_APP_URL: ${{ vars.WEB_PUBLIC_APP_URL }}
          WEB_ADMIN_SITE_URL: ${{ vars.WEB_ADMIN_SITE_URL }}
          WEB_ADMIN_HOSTS: ${{ vars.WEB_ADMIN_HOSTS }}
          WEB_MAIN_APP_HOSTS: ${{ vars.WEB_MAIN_APP_HOSTS }}
        run: |
          chmod +x scripts/ci/gha-docker-build-push.sh
          scripts/ci/gha-docker-build-push.sh

      - name: Record image push outcome
        id: push_outcome
        if: always()
        run: |
          if [ "${{ steps.decide.outputs.run_build }}" != "true" ]; then
            echo "images_pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ steps.dh_login.outputs.skip }}" = "true" ]; then
            echo "images_pushed=false" >> "$GITHUB_OUTPUT"
            echo "No Docker Hub token — cluster images unchanged by this job." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ "${{ steps.docker_push.outcome }}" = "success" ]; then
            echo "images_pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "images_pushed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build summary
        if: always()
        run: |
          echo "### Images" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag (when built):** \`${IMAGE_TAG}\` and \`:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **run_build:** ${{ steps.decide.outputs.run_build }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **images_pushed:** ${{ steps.push_outcome.outputs.images_pushed }}" >> "$GITHUB_STEP_SUMMARY"

  deploy_remote:
    needs: [detect, test, build-push]
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' || inputs.skip_deploy != 'true') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.build-push.result == 'success' || needs.build-push.result == 'skipped') &&
      (vars.DEPLOY_MODE == 'remote' || vars.DEPLOY_MODE == '') &&
      vars.DEPLOY_MODE != 'ssh' &&
      vars.DEPLOY_MODE != 'self_hosted' &&
      vars.DEPLOY_MODE != 'none' &&
      vars.DEPLOY_MODE != 'off' &&
      vars.DEPLOY_MODE != 'false'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Require KUBE_CONFIG for remote deploy
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "${KUBE_CONFIG_B64}" ]; then
            echo "::error::Remote deploy is enabled (DEPLOY_MODE unset, remote, or empty) but KUBE_CONFIG secret is missing. Add base64 kubeconfig, or set DEPLOY_MODE=ssh / self_hosted, or DEPLOY_MODE=none to push images only."
            exit 1
          fi

      - name: Set up kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy to cluster (k3s-compatible)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          chmod +x scripts/ci/k8s-apply.sh
          export KUBECONFIG="$HOME/.kube/config"
          if [ "${{ needs.build-push.result }}" = "success" ] && \
             [ "${{ needs.build-push.outputs.images_pushed }}" = "true" ] && \
             [ "${{ needs.detect.outputs.build_any }}" = "true" ]; then
            export K8S_SKIP_SET_IMAGE=0
            export K8S_IMAGE_TAG="sha-${{ github.sha }}"
            UPD=""
            [ "${{ needs.detect.outputs.build_api_service }}" = "true" ] && UPD="$UPD api-service"
            [ "${{ needs.detect.outputs.build_audio_service }}" = "true" ] && UPD="$UPD audio-service"
            [ "${{ needs.detect.outputs.build_stt_service }}" = "true" ] && UPD="$UPD stt-service"
            [ "${{ needs.detect.outputs.build_question_service }}" = "true" ] && UPD="$UPD question-service"
            [ "${{ needs.detect.outputs.build_llm_service }}" = "true" ] && UPD="$UPD llm-service"
            [ "${{ needs.detect.outputs.build_formatter_service }}" = "true" ] && UPD="$UPD formatter-service"
            [ "${{ needs.detect.outputs.build_monitoring_service }}" = "true" ] && UPD="$UPD monitoring-service"
            [ "${{ needs.detect.outputs.build_web }}" = "true" ] && UPD="$UPD web"
            export K8S_UPDATE_DEPLOYMENTS="$(echo "${UPD}" | xargs)"
            echo "Pinning workloads to K8S_IMAGE_TAG=${K8S_IMAGE_TAG} deployments=[${K8S_UPDATE_DEPLOYMENTS}]"
          else
            export K8S_SKIP_SET_IMAGE=1
            echo "Skipping kubectl set image (no new images this run or build-push skipped)."
          fi
          scripts/ci/k8s-apply.sh

      - name: Rollback hint on failure
        if: failure()
        run: |
          echo "::error::Deploy failed. To roll back one revision: kubectl rollout undo deployment/<name> -n interview-ai"

  deploy_self_hosted:
    needs: [detect, test, build-push]
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' || inputs.skip_deploy != 'true') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.build-push.result == 'success' || needs.build-push.result == 'skipped') &&
      vars.DEPLOY_MODE == 'self_hosted'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - name: Ensure kubectl
        run: |
          command -v kubectl >/dev/null 2>&1 && exit 0
          sudo ln -sf /usr/local/bin/kubectl /usr/bin/kubectl 2>/dev/null || true
          command -v kubectl >/dev/null 2>&1 && exit 0
          sudo k3s kubectl version --client=true

      - name: k3s kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          sudo cat /etc/rancher/k3s/k3s.yaml > "$HOME/.kube/config"
          sudo chown "$(id -u):$(id -g)" "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy to cluster
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          chmod +x scripts/ci/k8s-apply.sh
          export KUBECONFIG="$HOME/.kube/config"
          if [ "${{ needs.build-push.result }}" = "success" ] && \
             [ "${{ needs.build-push.outputs.images_pushed }}" = "true" ] && \
             [ "${{ needs.detect.outputs.build_any }}" = "true" ]; then
            export K8S_SKIP_SET_IMAGE=0
            export K8S_IMAGE_TAG="sha-${{ github.sha }}"
            UPD=""
            [ "${{ needs.detect.outputs.build_api_service }}" = "true" ] && UPD="$UPD api-service"
            [ "${{ needs.detect.outputs.build_audio_service }}" = "true" ] && UPD="$UPD audio-service"
            [ "${{ needs.detect.outputs.build_stt_service }}" = "true" ] && UPD="$UPD stt-service"
            [ "${{ needs.detect.outputs.build_question_service }}" = "true" ] && UPD="$UPD question-service"
            [ "${{ needs.detect.outputs.build_llm_service }}" = "true" ] && UPD="$UPD llm-service"
            [ "${{ needs.detect.outputs.build_formatter_service }}" = "true" ] && UPD="$UPD formatter-service"
            [ "${{ needs.detect.outputs.build_monitoring_service }}" = "true" ] && UPD="$UPD monitoring-service"
            [ "${{ needs.detect.outputs.build_web }}" = "true" ] && UPD="$UPD web"
            export K8S_UPDATE_DEPLOYMENTS="$(echo "${UPD}" | xargs)"
          else
            export K8S_SKIP_SET_IMAGE=1
          fi
          scripts/ci/k8s-apply.sh

      - name: Pull Ollama model (non-fatal)
        run: |
          export KUBECONFIG="$HOME/.kube/config"
          kubectl exec -n interview-ai deploy/ollama -- ollama pull qwen2.5:0.5b || true

  deploy_ssh_bootstrap:
    needs: [detect, test, build-push]
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' || inputs.skip_deploy != 'true') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.build-push.result == 'success' || needs.build-push.result == 'skipped') &&
      vars.DEPLOY_MODE == 'ssh'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y openssh-client rsync

      - name: Configure SSH key
        run: |
          mkdir -p "$HOME/.ssh"
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > "$HOME/.ssh/id_rsa"
          chmod 600 "$HOME/.ssh/id_rsa"
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> "$HOME/.ssh/known_hosts"

      - name: Sync manifests + apply on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
          BUILD_PUSH_RESULT: ${{ needs.build-push.result }}
          IMAGES_PUSHED: ${{ needs.build-push.outputs.images_pushed }}
          BUILD_ANY: ${{ needs.detect.outputs.build_any }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          K8S_UPDATE_DEPLOYMENTS=""
          if [ "${{ needs.build-push.result }}" = "success" ] && \
             [ "${{ needs.build-push.outputs.images_pushed }}" = "true" ] && \
             [ "${{ needs.detect.outputs.build_any }}" = "true" ]; then
            UPD=""
            [ "${{ needs.detect.outputs.build_api_service }}" = "true" ] && UPD="$UPD api-service"
            [ "${{ needs.detect.outputs.build_audio_service }}" = "true" ] && UPD="$UPD audio-service"
            [ "${{ needs.detect.outputs.build_stt_service }}" = "true" ] && UPD="$UPD stt-service"
            [ "${{ needs.detect.outputs.build_question_service }}" = "true" ] && UPD="$UPD question-service"
            [ "${{ needs.detect.outputs.build_llm_service }}" = "true" ] && UPD="$UPD llm-service"
            [ "${{ needs.detect.outputs.build_formatter_service }}" = "true" ] && UPD="$UPD formatter-service"
            [ "${{ needs.detect.outputs.build_monitoring_service }}" = "true" ] && UPD="$UPD monitoring-service"
            [ "${{ needs.detect.outputs.build_web }}" = "true" ] && UPD="$UPD web"
            K8S_UPDATE_DEPLOYMENTS="$(echo "${UPD}" | xargs)"
          fi
          export K8S_UPDATE_DEPLOYMENTS

          rsync -az --delete -e "ssh -i $HOME/.ssh/id_rsa" ./k8s ./scripts "${SSH_USER}@${SSH_HOST}:~/interviewgenie-k8s/"

          ssh -i "$HOME/.ssh/id_rsa" "${SSH_USER}@${SSH_HOST}" bash -lc "set -euo pipefail
            export DOCKERHUB_USERNAME=\"${DOCKERHUB_USERNAME}\"
            export DOCKERHUB_TOKEN=\"${DOCKERHUB_TOKEN}\"
            export BUILD_PUSH_RESULT=\"${BUILD_PUSH_RESULT}\"
            export IMAGES_PUSHED=\"${IMAGES_PUSHED}\"
            export BUILD_ANY=\"${BUILD_ANY}\"
            export GITHUB_SHA=\"${GITHUB_SHA}\"
            export K8S_UPDATE_DEPLOYMENTS=\"${K8S_UPDATE_DEPLOYMENTS}\"
            LE_MAIL=\"${LETSENCRYPT_EMAIL}\"

            if ! command -v curl >/dev/null 2>&1; then
              if command -v dnf >/dev/null 2>&1; then sudo dnf install -y curl
              elif command -v apt-get >/dev/null 2>&1; then sudo apt-get update && sudo apt-get install -y curl
              else echo 'Install curl manually'; exit 1; fi
            fi
            if ! command -v docker >/dev/null 2>&1; then
              if command -v dnf >/dev/null 2>&1; then sudo dnf install -y docker && sudo systemctl enable --now docker || true
              elif command -v apt-get >/dev/null 2>&1; then sudo apt-get update && sudo apt-get install -y docker.io && sudo usermod -aG docker \$USER || true
              fi
            fi

            if ! command -v k3s >/dev/null 2>&1; then curl -sfL https://get.k3s.io | sh -; fi
            sudo k3s kubectl get nodes

            mkdir -p \$HOME/.kube
            sudo cat /etc/rancher/k3s/k3s.yaml > \$HOME/.kube/config
            sudo chown \$(id -u):\$(id -g) \$HOME/.kube/config
            chmod 600 \$HOME/.kube/config
            export KUBECONFIG=\$HOME/.kube/config

            if [ \"\${BUILD_PUSH_RESULT}\" = \"success\" ] && [ \"\${IMAGES_PUSHED}\" = \"true\" ] && [ \"\${BUILD_ANY}\" = \"true\" ]; then
              export K8S_SKIP_SET_IMAGE=0
              export K8S_IMAGE_TAG=\"sha-\${GITHUB_SHA}\"
            else
              export K8S_SKIP_SET_IMAGE=1
              unset K8S_UPDATE_DEPLOYMENTS || true
            fi

            if [ -n \"\${DOCKERHUB_USERNAME}\" ] && [ -n \"\${DOCKERHUB_TOKEN}\" ]; then
              printf '%s' \"\${DOCKERHUB_TOKEN}\" | docker login -u \"\${DOCKERHUB_USERNAME}\" --password-stdin
            fi

            if [ -n \"\${LE_MAIL}\" ]; then
              sed -i \"s|azizowaisi@teckiz.com|\${LE_MAIL}|g\" \$HOME/interviewgenie-k8s/k8s/traefik/helmchartconfig.yaml || true
            fi

            chmod +x \$HOME/interviewgenie-k8s/scripts/ci/k8s-apply.sh
            bash \$HOME/interviewgenie-k8s/scripts/ci/k8s-apply.sh
          "
