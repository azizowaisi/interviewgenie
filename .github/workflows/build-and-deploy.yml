# Push to main + manual dispatch only — full pipeline: test, build, registry push, deploy.
# PR validation lives in ci.yml (separate workflow so merge does not double-trigger this file).
#
# Deploy modes (repo variable DEPLOY_MODE — Settings → Actions → Variables):
#   remote         — GitHub-hosted runner + secret KUBE_CONFIG (API 6443 reachable)
#   self_hosted    — Runner on the k3s node (local kubeconfig)
#   ssh            — SSH to VM: rsync manifests, optional k3s install, kubectl apply
#   (unset/other)  — Build + push only, no deploy job
#
# Manual run: Actions → Build and Deploy → Run workflow.
# See docs/DEPLOY-GIT-K8S.md

name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip Python unit tests (faster manual deploy)"
        type: boolean
        default: false
      skip_deploy:
        description: "Push images only; do not run any deploy job"
        type: boolean
        default: false

# One deploy pipeline at a time on main; supersede overlapping pushes.
concurrency:
  group: ${{ github.workflow }}-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SERVICES: api-service audio-service stt-service question-service llm-service formatter-service monitoring-service

jobs:
  test:
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_dispatch' || inputs.skip_tests != true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run backend unit tests
        run: |
          for s in question-service formatter-service llm-service stt-service audio-service; do
            echo "---- Testing $s ----"
            pip install -q -r backend/$s/requirements.txt
            (cd backend/$s && python -m pytest tests/ -v --tb=short) || exit 1
          done

  build:
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all service images (no push)
        run: |
          for s in ${{ env.SERVICES }}; do
            docker build -t interview-ai/$s:latest ./backend/$s
          done
          docker build -t interview-ai/web:latest ./web

  push:
    needs: build
    if: |
      always() &&
      needs.build.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in and push to Docker Hub
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          WEB_PUBLIC_APP_URL: ${{ vars.WEB_PUBLIC_APP_URL }}
          WEB_ADMIN_SITE_URL: ${{ vars.WEB_ADMIN_SITE_URL }}
          WEB_ADMIN_HOSTS: ${{ vars.WEB_ADMIN_HOSTS }}
          WEB_MAIN_APP_HOSTS: ${{ vars.WEB_MAIN_APP_HOSTS }}
        run: |
          if [ -z "${DH_TOKEN}" ]; then
            echo "No DOCKERHUB_TOKEN; skipping Docker Hub push."
            exit 0
          fi
          DH_USER="$(printf '%s' "${DH_USER}" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          DH_TOKEN="$(printf '%s' "${DH_TOKEN}" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          if [ -z "${DH_USER}" ]; then
            echo "DOCKERHUB_USERNAME is empty after trim; check GitHub secret."
            exit 1
          fi
          if ! printf '%s' "${DH_TOKEN}" | docker login -u "${DH_USER}" --password-stdin; then
            echo "Docker Hub login failed."
            exit 1
          fi
          for s in ${{ env.SERVICES }}; do
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              -t "${DH_USER}/interview-ai-${s}:latest" \
              "./backend/${s}" \
              --push
          done
          PUB="${WEB_PUBLIC_APP_URL:-https://interviewgenie.teckiz.com}"
          ADM_SITE="${WEB_ADMIN_SITE_URL:-https://admin.interviewgenie.teckiz.com}"
          ADM_HOSTS="${WEB_ADMIN_HOSTS:-admin.interviewgenie.teckiz.com}"
          MAIN_HOSTS="${WEB_MAIN_APP_HOSTS:-interviewgenie.teckiz.com,www.interviewgenie.teckiz.com}"
          echo "Web image NEXT_PUBLIC_*: PUB=$PUB ADM_SITE=$ADM_SITE ADM_HOSTS=$ADM_HOSTS MAIN_HOSTS=$MAIN_HOSTS"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg "NEXT_PUBLIC_PUBLIC_APP_URL=${PUB}" \
            --build-arg "NEXT_PUBLIC_ADMIN_SITE_URL=${ADM_SITE}" \
            --build-arg "NEXT_PUBLIC_ADMIN_HOSTS=${ADM_HOSTS}" \
            --build-arg "NEXT_PUBLIC_MAIN_APP_HOSTS=${MAIN_HOSTS}" \
            -t "${DH_USER}/interview-ai-web:latest" \
            "./web" \
            --push

  deploy_remote:
    needs: push
    if: |
      always() &&
      needs.push.result == 'success' &&
      (github.event_name != 'workflow_dispatch' || inputs.skip_deploy != true) &&
      vars.DEPLOY_MODE == 'remote'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy to cluster (k3s-compatible)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          chmod +x scripts/ci/k8s-apply.sh
          export KUBECONFIG="$HOME/.kube/config"
          scripts/ci/k8s-apply.sh

  deploy_self_hosted:
    needs: push
    if: |
      always() &&
      needs.push.result == 'success' &&
      (github.event_name != 'workflow_dispatch' || inputs.skip_deploy != true) &&
      vars.DEPLOY_MODE == 'self_hosted'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - name: Ensure kubectl
        run: |
          command -v kubectl >/dev/null 2>&1 && exit 0
          sudo ln -sf /usr/local/bin/kubectl /usr/bin/kubectl 2>/dev/null || true
          command -v kubectl >/dev/null 2>&1 && exit 0
          sudo k3s kubectl version --client=true

      - name: k3s kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          sudo cat /etc/rancher/k3s/k3s.yaml > "$HOME/.kube/config"
          sudo chown "$(id -u):$(id -g)" "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy to cluster
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          chmod +x scripts/ci/k8s-apply.sh
          export KUBECONFIG="$HOME/.kube/config"
          scripts/ci/k8s-apply.sh

      - name: Pull Ollama model (non-fatal)
        run: |
          export KUBECONFIG="$HOME/.kube/config"
          kubectl exec -n interview-ai deploy/ollama -- ollama pull qwen2.5:0.5b || true

  deploy_ssh_bootstrap:
    needs: push
    if: |
      always() &&
      needs.push.result == 'success' &&
      (github.event_name != 'workflow_dispatch' || inputs.skip_deploy != true) &&
      vars.DEPLOY_MODE == 'ssh'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y openssh-client rsync

      - name: Configure SSH key
        run: |
          mkdir -p "$HOME/.ssh"
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > "$HOME/.ssh/id_rsa"
          chmod 600 "$HOME/.ssh/id_rsa"
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> "$HOME/.ssh/known_hosts"

      - name: Sync manifests + apply on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
        run: |
          rsync -az --delete -e "ssh -i $HOME/.ssh/id_rsa" ./k8s ./scripts "${SSH_USER}@${SSH_HOST}:~/interviewgenie-k8s/"

          ssh -i "$HOME/.ssh/id_rsa" "${SSH_USER}@${SSH_HOST}" bash -lc "set -euo pipefail
            export DOCKERHUB_USERNAME=\"${DOCKERHUB_USERNAME}\"
            export DOCKERHUB_TOKEN=\"${DOCKERHUB_TOKEN}\"
            LE_MAIL=\"${LETSENCRYPT_EMAIL}\"

            if ! command -v curl >/dev/null 2>&1; then
              if command -v dnf >/dev/null 2>&1; then sudo dnf install -y curl
              elif command -v apt-get >/dev/null 2>&1; then sudo apt-get update && sudo apt-get install -y curl
              else echo 'Install curl manually'; exit 1; fi
            fi
            if ! command -v docker >/dev/null 2>&1; then
              if command -v dnf >/dev/null 2>&1; then sudo dnf install -y docker && sudo systemctl enable --now docker || true
              elif command -v apt-get >/dev/null 2>&1; then sudo apt-get update && sudo apt-get install -y docker.io && sudo usermod -aG docker \$USER || true
              fi
            fi

            if ! command -v k3s >/dev/null 2>&1; then curl -sfL https://get.k3s.io | sh -; fi
            sudo k3s kubectl get nodes

            mkdir -p \$HOME/.kube
            sudo cat /etc/rancher/k3s/k3s.yaml > \$HOME/.kube/config
            sudo chown \$(id -u):\$(id -g) \$HOME/.kube/config
            chmod 600 \$HOME/.kube/config
            export KUBECONFIG=\$HOME/.kube/config

            if [ -n \"\${DOCKERHUB_USERNAME}\" ] && [ -n \"\${DOCKERHUB_TOKEN}\" ]; then
              printf '%s' \"\${DOCKERHUB_TOKEN}\" | docker login -u \"\${DOCKERHUB_USERNAME}\" --password-stdin
            fi

            if [ -n \"\${LE_MAIL}\" ]; then
              sed -i \"s|azizowaisi@teckiz.com|\${LE_MAIL}|g\" \$HOME/interviewgenie-k8s/k8s/traefik/helmchartconfig.yaml || true
            fi

            chmod +x \$HOME/interviewgenie-k8s/scripts/ci/k8s-apply.sh
            bash \$HOME/interviewgenie-k8s/scripts/ci/k8s-apply.sh
          "
