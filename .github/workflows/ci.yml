# Pull requests only — full verification before merge (no push / no deploy).
# Merge to main → build-and-deploy.yml runs separately (single deploy pipeline).
#
# Branch protection: require **CI / ci-gate** (aggregates backend + frontend + Docker).
#   Or require individual jobs: backend-tests matrix legs, frontend-verify matrix legs, docker-verify.
name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SERVICES: api-service audio-service stt-service question-service llm-service formatter-service monitoring-service

jobs:
  backend-tests:
    name: backend-tests (${{ matrix.service }})
    strategy:
      fail-fast: false
      matrix:
        service: [question-service, formatter-service, llm-service, stt-service, audio-service]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/${{ matrix.service }}/requirements.txt

      - name: Run backend unit tests
        run: |
          pip install -q -r "backend/${{ matrix.service }}/requirements.txt"
          (cd "backend/${{ matrix.service }}" && python -m pytest tests/ -q --tb=short)

  # Next.js + two Vue apps in parallel (after backend tests pass).
  frontend-verify:
    name: frontend-verify (${{ matrix.app }})
    needs: backend-tests
    if: always() && needs.backend-tests.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: web
            dir: web
          - app: api-frontend
            dir: backend/api-service/frontend
          - app: monitoring-frontend
            dir: backend/monitoring-service/frontend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: npm ci & build
        run: |
          cd "${{ matrix.dir }}"
          npm ci
          npm run build

  # Docker builds do not need host-side npm artifacts; runs parallel to frontend-verify.
  docker-verify:
    name: docker-verify (all images)
    needs: backend-tests
    if: always() && needs.backend-tests.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker — all service images + web
        run: |
          for s in ${{ env.SERVICES }}; do
            echo "==== docker build backend/$s ===="
            docker build -t interview-ai/$s:latest ./backend/$s
          done
          echo "==== docker build web ===="
          docker build -t interview-ai/web:latest ./web

  ci-gate:
    name: ci-gate
    needs: [backend-tests, frontend-verify, docker-verify]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Require all checks green
        run: |
          set -euo pipefail
          ok() { [ "$1" = "success" ]; }
          if ! ok "${{ needs.backend-tests.result }}"; then
            echo "::error::backend-tests did not succeed (result=${{ needs.backend-tests.result }})"
            exit 1
          fi
          if ! ok "${{ needs.frontend-verify.result }}"; then
            echo "::error::frontend-verify did not succeed (result=${{ needs.frontend-verify.result }})"
            exit 1
          fi
          if ! ok "${{ needs.docker-verify.result }}"; then
            echo "::error::docker-verify did not succeed (result=${{ needs.docker-verify.result }})"
            exit 1
          fi
          echo "All CI jobs succeeded."
