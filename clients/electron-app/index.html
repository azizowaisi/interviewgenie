<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interview Genie</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #0f0f12; color: #e8e8ed; min-height: 100vh; padding: 2rem; }
    .app { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 1.75rem; margin: 0; }
    .subtitle { color: #888; margin: 0.25rem 0 2rem 0; }
    input { width: 100%; padding: 0.5rem; background: #1a1a1f; border: 1px solid #333; border-radius: 8px; color: #e8e8ed; margin-bottom: 1rem; }
    .controls { display: flex; gap: 0.75rem; margin-bottom: 1rem; }
    .btn { padding: 0.6rem 1.2rem; border-radius: 8px; font-size: 0.95rem; cursor: pointer; border: none; }
    .btn.primary { background: #6366f1; color: white; }
    .btn.secondary { background: #1a1a1f; color: #e8e8ed; border: 1px solid #333; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { min-height: 1.5rem; color: #888; margin-bottom: 1rem; }
    .error { color: #ef4444; padding: 0.75rem; background: rgba(239,68,68,0.1); border-radius: 8px; margin-top: 1rem; }
    .star-card { background: #1a1a1f; border-radius: 10px; padding: 1rem; margin-bottom: 0.5rem; }
    .star-card h3 { font-size: 0.8rem; color: #6366f1; margin: 0 0 0.5rem 0; }
  </style>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>Interview Genie</h1>
      <p class="subtitle">Speak your question, get a STAR answer</p>
    </header>
    <main>
      <div class="controls">
        <button id="startBtn" class="btn primary">Start recording</button>
        <button id="stopBtn" class="btn secondary" disabled>Stop & get answer</button>
      </div>
      <p id="status" class="status"></p>
      <section class="answer" id="answerSection" hidden>
        <h2>STAR answer</h2>
        <div class="star-grid">
          <div class="star-card">
            <h3>Situation</h3>
            <p id="situation"></p>
          </div>
          <div class="star-card">
            <h3>Task</h3>
            <p id="task"></p>
          </div>
          <div class="star-card">
            <h3>Action</h3>
            <p id="action"></p>
          </div>
          <div class="star-card">
            <h3>Result</h3>
            <p id="result"></p>
          </div>
        </div>
      </section>
      <section id="errorSection" class="error" hidden>
        <p id="errorText"></p>
      </section>
    </main>
  </div>
  <script src="renderer.js" defer></script>
</body>
</html>
