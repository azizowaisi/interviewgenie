# Local full stack: Next.js web + fake monitoring API (no Kubernetes required).
#
# Usage (from repo root):
#   docker compose -f docker-compose.yml -f docker-compose.local.yml --profile ollama up -d --build
#
# Then open: http://localhost:3002
# APIs: 8001 (api-service), 8000 (audio), 3001 (monitoring stub), 27017 (mongo)
#
# Auth0 (optional): set AUTH0_DOMAIN, AUTH0_AUDIENCE, AUTH0_CLIENT_ID (+ secrets) in repo-root `.env`.
# Same CLIENT_ID on web and api-service so ID-token fallback matches api-service JWT verification.

services:
  api-service:
    environment:
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-}
      CV_PARSER_URL: http://cv-parser-service:8000
      # When enabled, /cv/optimize JSON parsing failures include a short raw preview.
      LLM_JSON_DEBUG: "1"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      LLM_OPTIMIZE_TIMEOUT_SECONDS: "1200"
      # Keep the coordinator "rules" step bounded; if Ollama hangs, fail fast and show error.
      CV_OPTIMIZE_RULES_TIMEOUT_SECONDS: "180"
      CV_OPTIMIZE_RULES_NUM_PREDICT: "240"
      # Keep summary + bullets bounded (Ollama on CPU can be slow).
      CV_OPTIMIZE_SUMMARY_TIMEOUT_SECONDS: "180"
      CV_OPTIMIZE_SUMMARY_NUM_PREDICT: "120"
      CV_OPTIMIZE_BULLETS_TIMEOUT_SECONDS: "240"
      CV_OPTIMIZE_BULLETS_NUM_PREDICT: "200"
      RABBITMQ_HEARTBEAT_SECONDS: "600"
      RABBITMQ_BLOCKED_TIMEOUT_SECONDS: "600"
      CV_RENDERER_URL: http://cv-renderer-service:8000
      # Avoid "Queued forever" when cv-optimize-worker is not running (still use worker in production if you prefer).
      CV_OPTIMIZE_EXECUTION_MODE: inline
      # Same for modular CV engine: set to queue + run cv-engine-worker + cv-engine-aggregator for Rabbit flow.
      CV_ENGINE_EXECUTION_MODE: inline

  llm-service:
    environment:
      # Safety: don't return MOCK_ANSWER on errors (breaks JSON callers).
      LLM_ALLOW_MOCK: "0"
      OLLAMA_TIMEOUT_SECONDS: "1200"
      # Keep generations bounded so /generate doesn't run for minutes on CPU.
      OLLAMA_NUM_PREDICT: "320"

  monitoring-local:
    build:
      context: ./backend/monitoring-local-stub
      dockerfile: Dockerfile
    ports:
      - "3001:3001"

  web:
    env_file:
      - .env
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
        AUTH0_ISSUER_BASE_URL: ${AUTH0_ISSUER_BASE_URL:-}
        AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-}
        AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET:-}
        AUTH0_SECRET: ${AUTH0_SECRET:-}
        AUTH0_BASE_URL: ${AUTH0_BASE_URL:-http://localhost:3002}
        APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3002}
        NEXT_PUBLIC_PUBLIC_APP_URL: ${NEXT_PUBLIC_PUBLIC_APP_URL:-http://localhost:3002}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
        NEXT_PUBLIC_ADMIN_SITE_URL: ${NEXT_PUBLIC_ADMIN_SITE_URL:-}
        NEXT_PUBLIC_ADMIN_HOSTS: ${NEXT_PUBLIC_ADMIN_HOSTS:-}
        NEXT_PUBLIC_MAIN_APP_HOSTS: ${NEXT_PUBLIC_MAIN_APP_HOSTS:-}
        NEXT_PUBLIC_DESKTOP_DOWNLOADS_JSON: ${NEXT_PUBLIC_DESKTOP_DOWNLOADS_JSON:-}
        NEXT_PUBLIC_DESKTOP_DOWNLOAD_MAC: ${NEXT_PUBLIC_DESKTOP_DOWNLOAD_MAC:-}
        NEXT_PUBLIC_DESKTOP_DOWNLOAD_WIN: ${NEXT_PUBLIC_DESKTOP_DOWNLOAD_WIN:-}
        NEXT_PUBLIC_DESKTOP_DOWNLOAD_LINUX: ${NEXT_PUBLIC_DESKTOP_DOWNLOAD_LINUX:-}
        NEXT_PUBLIC_DESKTOP_DOWNLOADS_PAGE: ${NEXT_PUBLIC_DESKTOP_DOWNLOADS_PAGE:-}
        NEXT_PUBLIC_DESKTOP_INSTALLER_BASE: ${NEXT_PUBLIC_DESKTOP_INSTALLER_BASE:-}
    ports:
      - "3002:3002"
    environment:
      API_URL: http://api-service:8001
      AUDIO_URL: http://audio-service:8000
      MONITORING_URL: http://monitoring-local:3001
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_ISSUER_BASE_URL: ${AUTH0_ISSUER_BASE_URL:-}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET:-}
      AUTH0_SECRET: ${AUTH0_SECRET:-}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      AUTH0_BASE_URL: ${AUTH0_BASE_URL:-http://localhost:3002}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3002}
      NEXT_PUBLIC_PUBLIC_APP_URL: ${NEXT_PUBLIC_PUBLIC_APP_URL:-http://localhost:3002}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
      NEXT_PUBLIC_ADMIN_SITE_URL: ${NEXT_PUBLIC_ADMIN_SITE_URL:-}
      NEXT_PUBLIC_ADMIN_HOSTS: ${NEXT_PUBLIC_ADMIN_HOSTS:-}
      NEXT_PUBLIC_MAIN_APP_HOSTS: ${NEXT_PUBLIC_MAIN_APP_HOSTS:-}
      AUTH0_COOKIE_SECURE: ${AUTH0_COOKIE_SECURE:-false}
    depends_on:
      - api-service
      - audio-service
      - monitoring-local
